<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Murottal Kids - YouTube Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root{--bg:#FAFAFA;--surface:#FFF;--surface-alt:#F8F7F4;--line:#E8E6E1;--text:#2C2C2C;--text-light:#8A8A8A;--primary:#FF6B6B;--primary-soft:#FFF0F0;--secondary:#4ECDC4;--secondary-soft:#E8FAF8;--green:#34C759;--green-soft:#E8F9EE;--purple:#9B87F5;--purple-soft:#F3F0FF;--blue:#5AC8FA;--blue-soft:#E8F4FD;--orange:#FF9F0A;--orange-soft:#FFF5E0;--radius:16px;--radius-sm:12px;--shadow:0 2px 12px rgba(0,0,0,.06);--shadow-lg:0 8px 30px rgba(0,0,0,.12)}
        *{box-sizing:border-box;margin:0;padding:0} html{scroll-behavior:smooth}
        body{font-family:"Nunito",sans-serif;background:var(--bg);color:var(--text);line-height:1.5;padding-bottom:80px}
        button,input{font:inherit}
        .topbar{position:sticky;top:0;z-index:100;background:rgba(255,255,255,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--line)}
        html.fullscreen-active .topbar{display:none}
        .topbar-inner{max-width:1320px;margin:0 auto;padding:12px 20px;display:flex;align-items:center;gap:16px}
        .brand{display:flex;align-items:center;gap:10px;font-weight:800;font-size:20px;color:var(--text);white-space:nowrap}
        .brand i{color:var(--primary);font-size:22px}
        .searchbar{display:grid;grid-template-columns:1fr 48px;gap:8px;align-items:center;flex:1;max-width:560px}
        .search-input{width:100%;border:1.5px solid var(--line);background:var(--surface);border-radius:999px;padding:10px 16px;font-size:14px;transition:border-color .15s}
        .search-input:focus{outline:none;border-color:var(--primary)}
        .search-btn{border:none;background:var(--primary);color:#fff;border-radius:50%;cursor:pointer;height:42px;width:42px;display:grid;place-items:center;transition:background .15s,transform .15s}
        .search-btn:hover{background:#E55555;transform:scale(1.05)}
        .search-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

        .page{max-width:1320px;margin:20px auto 40px;padding:0 20px;display:grid;grid-template-columns:minmax(0,1fr) 360px;gap:24px;align-items:start}
        .page.theater-mode{grid-template-columns:1fr;max-width:100%;padding:0}
        .page.theater-mode .watch-column{grid-template-columns:1fr;padding:0}
        .page.theater-mode .sidebar{position:static;width:100%;max-width:720px;margin:24px auto}
        .page.theater-mode .player-wrap.theater{border-radius:var(--radius) var(--radius) 0 0;max-width:800px;margin:0 auto}
        .watch-column{display:grid;gap:20px}

        .quick-chips{display:flex;flex-wrap:wrap;gap:8px}
        .quick-chip{border:1.5px solid var(--line);background:var(--surface);color:var(--text);border-radius:999px;padding:8px 14px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s}
        .quick-chip:hover{background:var(--primary-soft);border-color:var(--primary);color:var(--primary)}

        .player-wrap{background:#111;border-radius:var(--radius);overflow:hidden;aspect-ratio:16/9;display:none;box-shadow:var(--shadow);position:relative;transition:border-radius .3s,max-width .3s,box-shadow .3s}
        .player-wrap.visible{display:block}
        .player-wrap.minimized{max-width:300px;aspect-ratio:16/9;box-shadow:var(--shadow-lg);position:fixed;bottom:90px;right:20px;border-radius:var(--radius-sm);z-index:90;animation:slideUp .25s ease}
        @keyframes slideUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
        .player-wrap.controls-hidden .overlay{opacity:0}
        .player-wrap:fullscreen{width:100vw;height:100vh;border-radius:0;display:block!important;position:fixed;top:0;left:0}

        #youtube-player{width:100%;height:100%}
        .player-shield{position:absolute;inset:0;z-index:1;background:transparent}
        .overlay{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;justify-content:space-between;background:linear-gradient(180deg,rgba(0,0,0,.25),transparent 30%,transparent 60%,rgba(0,0,0,.6));pointer-events:none;transition:opacity .2s,visibility .2s}
        .overlay.hidden{display:none}
        .player-bottom{pointer-events:auto;padding:12px 14px;display:flex;align-items:center;gap:10px;position:absolute;bottom:0;width:100%;flex-wrap:wrap}
        .player-wrap.controls-hidden .player-bottom{pointer-events:none}
        .player-progress{flex:1;min-width:80px}
        .progress-bar{height:6px;border-radius:999px;overflow:hidden;cursor:pointer;background:rgba(255,255,255,.2)}
        .progress-value{height:100%;width:0%;background:var(--primary);border-radius:999px;transition:width .1s linear}
        .progress-text{color:rgba(255,255,255,.85);font-size:12px;font-weight:700;text-align:center;margin-top:4px;min-width:90px}
        .player-controls{display:flex;gap:6px}
        .p-ctrl{border:none;border-radius:999px;padding:8px 12px;background:rgba(255,255,255,.15);color:#fff;cursor:pointer;font-weight:700;backdrop-filter:blur(8px);display:flex;align-items:center;gap:5px;font-size:13px;transition:background .15s}
        .p-ctrl.primary{background:rgba(255,107,107,.8)}
        .p-ctrl:hover{background:rgba(255,255,255,.25)}
        .p-ctrl.primary:hover{background:var(--primary)}

        .video-info{display:none;gap:6px}
        .video-info.visible{display:flex;flex-direction:column}
        .video-info.minimized{display:none!important}
        .page.theater-mode .video-info.visible{max-width:800px;margin:16px auto 0}
        .video-title{font-size:clamp(17px,2vw,22px);line-height:1.3;font-weight:800}
        .video-meta{display:flex;flex-wrap:wrap;gap:6px;color:var(--text-light);font-size:13px;font-weight:600}
        .meta-badge{padding:4px 10px;border-radius:999px;background:var(--surface-alt)}

        .card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
        .card-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
        .card-head h3{font-size:15px;font-weight:800;display:flex;align-items:center;gap:8px}
        .card-head .icon{width:28px;height:28px;border-radius:8px;display:grid;place-items:center;font-size:13px;color:#fff}
        .card-head span{color:var(--text-light);font-size:12px;font-weight:600}

        .results{display:grid;gap:10px}
        .result-item{display:grid;grid-template-columns:150px 1fr;gap:10px;padding:8px;border-radius:var(--radius-sm);cursor:pointer;border:1px solid transparent;transition:all .15s}
        .result-item:hover{border-color:var(--line);background:var(--surface-alt)}
        .result-item.active{border-color:var(--secondary);background:var(--secondary-soft)}
        .result-thumb{position:relative;aspect-ratio:16/9;border-radius:10px;overflow:hidden;background:var(--surface-alt)}
        .result-thumb img{width:100%;height:100%;object-fit:cover}
        .result-thumb .duration{position:absolute;right:6px;bottom:6px;background:rgba(0,0,0,.75);color:#fff;border-radius:4px;padding:2px 5px;font-size:10px;font-weight:700}
        .result-body{min-width:0;padding:2px 0}
        .result-body strong{display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;overflow:hidden;font-size:14px;font-weight:700;margin-bottom:3px}
        .result-body p{color:var(--text-light);font-size:12px;display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;overflow:hidden}
        .empty{padding:24px;border-radius:var(--radius-sm);background:var(--surface-alt);color:var(--text-light);text-align:center;font-size:14px;font-weight:600}

        .loading-more{text-align:center;padding:12px;color:var(--text-light);display:none;font-weight:600;font-size:13px}
        .loading-more.active{display:block}
        .loading-more i{animation:spin 1s linear infinite;margin-right:6px}
        @keyframes spin{to{transform:rotate(360deg)}}
        .load-more-btn{width:100%;padding:10px;margin-top:8px;border:1px solid var(--line);background:var(--surface);border-radius:var(--radius-sm);color:var(--text);font-weight:700;cursor:pointer;transition:background .15s;font-size:13px}
        .load-more-btn:hover:not(:disabled){background:var(--surface-alt);border-color:var(--text-light)}
        .load-more-btn:disabled{opacity:.5;cursor:not-allowed}
        .pagination-info{text-align:center;color:var(--text-light);font-size:12px;margin-top:6px;font-weight:600}

        .related-list{display:grid;gap:8px}
        .related-item{display:grid;grid-template-columns:100px 1fr;gap:8px;padding:6px;border-radius:10px;cursor:pointer;border:1px solid transparent;transition:all .15s}
        .related-item:hover,.related-item.active{border-color:var(--line);background:var(--surface-alt)}
        .related-thumb{position:relative;aspect-ratio:16/9;border-radius:8px;overflow:hidden;background:var(--surface-alt)}
        .related-thumb img{width:100%;height:100%;object-fit:cover}
        .related-thumb .related-duration{position:absolute;right:4px;bottom:4px;background:rgba(0,0,0,.75);color:#fff;border-radius:3px;padding:1px 4px;font-size:9px;font-weight:700}
        .related-body strong{display:-webkit-box;-webkit-box-orient:vertical;-webkit-line-clamp:2;overflow:hidden;font-size:13px;font-weight:700;margin-bottom:2px}
        .related-body p{color:var(--text-light);font-size:11px}

        .sidebar{position:sticky;top:80px;align-self:start;display:grid;gap:16px}
        .murottal-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius);padding:16px;box-shadow:var(--shadow)}
        .murottal-top{display:grid;grid-template-columns:48px 1fr;gap:10px;align-items:center;margin-bottom:14px}
        .murottal-cover{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--secondary));color:#fff;display:grid;place-items:center;font-size:18px;flex-shrink:0}
        .murottal-now strong{display:block;font-size:14px;font-weight:800;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .murottal-now span{color:var(--text-light);font-size:12px}

        .audio-controls{display:flex;align-items:center;gap:6px;justify-content:center}
        .a-btn{width:40px;height:40px;border-radius:50%;border:none;cursor:pointer;background:var(--surface-alt);color:var(--text);font-size:14px;display:grid;place-items:center;transition:all .15s}
        .a-btn:hover{background:var(--line);transform:scale(1.06)}
        .a-btn.primary{width:46px;height:46px;background:var(--green);color:#fff;box-shadow:0 3px 12px rgba(52,199,89,.3)}
        .a-btn.primary:hover{background:#2DB84E;transform:scale(1.1)}
        .a-btn.sync-btn{position:relative}
        .a-btn.sync-btn.blink{animation:pulse 1s infinite}
        @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,159,10,.4)}50%{box-shadow:0 0 0 8px rgba(255,159,10,0)}}

        .repeat-pill{display:flex;align-items:center;gap:4px;background:var(--surface-alt);border-radius:999px;padding:4px;margin:10px auto 0;width:fit-content}
        .r-opt{height:30px;border-radius:999px;border:none;cursor:pointer;background:transparent;color:var(--text-light);font-size:12px;font-weight:700;padding:0 10px;transition:all .15s}
        .r-opt:hover{background:var(--line)}
        .r-opt.active{background:var(--orange-soft);color:var(--orange)}
        .r-opt.active:hover{background:var(--orange);color:#fff}

        .murottal-search{margin:14px 0 10px;position:relative}
        .murottal-search input{width:100%;border:1px solid var(--line);background:var(--surface-alt);border-radius:10px;padding:9px 12px 9px 34px;font-size:13px}
        .murottal-search input:focus{outline:none;border-color:var(--green)}
        .murottal-search i{position:absolute;left:11px;top:50%;transform:translateY(-50%);color:var(--text-light);font-size:12px;pointer-events:none}

        .track-list{display:grid;gap:6px;max-height:300px;overflow-y:auto;padding-right:2px}
        .track-list::-webkit-scrollbar{width:4px}
        .track-list::-webkit-scrollbar-thumb{background:var(--line);border-radius:2px}
        .track-item{width:100%;text-align:left;border:1px solid var(--line);background:var(--surface);border-radius:10px;padding:8px 10px;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all .15s}
        .track-item:hover{border-color:var(--green);background:var(--green-soft)}
        .track-item.active{border-color:var(--green);background:var(--green-soft)}
        .track-item .num{width:24px;height:24px;border-radius:50%;background:var(--surface-alt);display:grid;place-items:center;font-size:11px;font-weight:800;color:var(--text-light);flex-shrink:0}
        .track-item.active .num{background:var(--green);color:#fff}
        .track-item .info{min-width:0}
        .track-item strong{display:block;font-size:12px;font-weight:700}
        .track-item span{font-size:11px;color:var(--text-light)}
        .track-item.no-results{text-align:center;padding:16px;color:var(--text-light);cursor:default;border:none;background:transparent}
        .track-item.no-results:hover{border-color:transparent;background:transparent}

        .volume-row{display:flex;align-items:center;gap:8px;margin-top:12px;font-size:13px;font-weight:600;color:var(--text-light)}
        .volume-row i{font-size:14px}
        input[type="range"]{flex:1;accent-color:var(--green);cursor:pointer;height:4px}
        .vol-val{font-size:11px;min-width:28px;text-align:right;font-weight:700}

        .expand-btn{position:absolute;inset:0;z-index:6;border:none;background:transparent;color:#fff;cursor:pointer;display:none;align-items:center;justify-content:center;font-size:24px;transition:background .2s,opacity .2s;opacity:0}
        .player-wrap.minimized .expand-btn{display:flex}
        .expand-btn:hover{background:rgba(0,0,0,.4);opacity:1}

        .player-wrap.minimized .player-shield{pointer-events:auto!important;z-index:3}
        .player-wrap.minimized .overlay{opacity:1!important;visibility:visible!important;pointer-events:auto!important}
        .player-wrap.minimized .overlay.hidden{display:flex!important;opacity:1!important}
        .player-wrap.minimized .player-bottom{opacity:0;pointer-events:none!important}

        .player-wrap:hover .overlay{opacity:1!important;visibility:visible!important}
        .player-wrap:hover .player-bottom{pointer-events:auto!important}
        .player-wrap.controls-hidden .overlay{opacity:0;visibility:hidden}
        .player-wrap:hover.controls-hidden .overlay{opacity:1!important;visibility:visible!important}

        .mobile-bar{display:none;position:fixed;bottom:0;left:0;right:0;z-index:95;background:rgba(255,255,255,.95);backdrop-filter:blur(16px);border-top:1px solid var(--line);padding:10px 14px;box-shadow:0 -4px 20px rgba(0,0,0,.06)}
        .mobile-bar-inner{max-width:600px;margin:0 auto;display:flex;align-items:center;gap:10px}
        .mobile-bar .m-track{flex:1;min-width:0}
        .mobile-bar .m-track strong{display:block;font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .mobile-bar .m-track span{font-size:11px;color:var(--text-light)}
        .mobile-bar .m-btns{display:flex;align-items:center;gap:4px}
        .mobile-bar .m-btn{width:36px;height:36px;border-radius:50%;border:none;background:var(--surface-alt);color:var(--text);font-size:14px;cursor:pointer;display:grid;place-items:center;transition:background .15s}
        .mobile-bar .m-btn.play-btn{background:var(--green);color:#fff;width:40px;height:40px}
        .mobile-bar .m-btn.rep-btn{font-size:12px}
        .mobile-bar .m-btn.rep-btn.active{background:var(--orange-soft);color:var(--orange)}

        .toast{position:fixed;left:50%;bottom:90px;transform:translateX(-50%) translateY(8px);background:var(--text);color:#fff;padding:10px 16px;border-radius:999px;font-size:13px;font-weight:700;opacity:0;pointer-events:none;transition:opacity .2s,transform .2s;z-index:200}
        .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

        .audio-blocked-notice{display:none;background:var(--orange-soft);border:1px solid var(--orange);border-radius:10px;padding:10px 14px;margin-top:12px;font-size:12px;font-weight:600;color:var(--text);align-items:center;gap:8px}
        .audio-blocked-notice.show{display:flex}
        .audio-blocked-notice button{margin-left:auto;padding:6px 12px;border:none;background:var(--orange);color:#fff;border-radius:999px;font-weight:700;cursor:pointer;font-size:12px}

        @media(max-width:1024px){.page{grid-template-columns:1fr}.sidebar{position:static}}
        @media(max-width:760px){
            body{padding-bottom:70px}
            .topbar-inner{flex-direction:column;gap:8px;padding:10px 14px}
            .searchbar{width:100%;max-width:none}
            .page{padding:0 12px;margin-top:12px}
            .player-bottom{padding:10px;gap:6px}
            .p-ctrl{padding:6px 10px;font-size:12px}
            .player-progress{min-width:60px}
            .result-item{grid-template-columns:1fr}
            .result-thumb{max-width:160px;margin:0 auto}
            .related-item{grid-template-columns:80px 1fr}
            .sidebar{display:none}
            .mobile-bar{display:block}
            .player-wrap.minimized{bottom:80px;right:12px;max-width:240px}
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <div class="brand"><i class="fa-solid fa-mosque"></i><span>Murottal Kids</span></div>
            <div class="searchbar">
                <input id="search-query" class="search-input" type="text" placeholder="Cari video...">
                <button id="search-button" class="search-btn" type="button"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
        </div>
    </header>

    <main class="page" id="main-page">
        <section class="watch-column">
            <div class="player-wrap" id="player-wrap">
                <div id="youtube-player"></div>
                <div id="player-shield" class="player-shield"></div>
                <button id="expand-btn" class="expand-btn" type="button"><i class="fa-solid fa-expand"></i></button>
                <div id="overlay" class="overlay">
                    <div class="player-bottom">
                        <div class="player-controls">
                            <button id="toggle-video" class="p-ctrl primary" type="button"><i class="fa-solid fa-play"></i></button>
                        </div>
                        <div class="player-progress">
                            <div class="progress-bar" id="progress-bar"><div id="progress-value" class="progress-value"></div></div>
                            <div id="time-display" class="progress-text">00:00 / 00:00</div>
                        </div>
                        <button id="theater-btn" class="p-ctrl" type="button" title="Theater"><i class="fa-solid fa-expand"></i></button>
                        <button id="fullscreen-btn" class="p-ctrl" type="button" title="Fullscreen"><i class="fa-solid fa-up-right-and-down-left-from-center"></i></button>
                    </div>
                </div>
            </div>

            <div class="video-info" id="video-info">
                <h1 id="current-title" class="video-title">Pilih video untuk mulai</h1>
                <div class="video-meta"><div id="current-meta" class="meta-badge">Video akan muncul di sini</div></div>
            </div>

            <div class="card" id="results-card">
                <div class="card-head">
                    <h3><span class="icon" style="background:var(--blue)"><i class="fa-solid fa-film"></i></span>Daftar Video</h3><span id="results-count">0 hasil</span>
                </div>
                <div class="quick-chips" style="margin-bottom:12px;">
                    <button class="quick-chip" type="button" data-query="nussa rarra">Nussa Rarra</button>
                    <button class="quick-chip" type="button" data-query="cerita ubay">Cerita Ubay</button>
                    <button class="quick-chip" type="button" data-query="sarah playschool">Sarah Playschool</button>
                    <button class="quick-chip" type="button" data-query="kartun islami anak">Kartun Islami</button>
                </div>
                <div id="results" class="results"><div class="empty">Cari video dari kolom pencarian</div></div>
                <div id="loading-more" class="loading-more"><i class="fa-solid fa-spinner"></i> Memuat...</div>
                <button id="load-more-btn" class="load-more-btn" style="display:none;"><i class="fa-solid fa-plus"></i> Muat Lebih Banyak</button>
                <div id="pagination-info" class="pagination-info"></div>
            </div>

            <div class="card" id="related-section" style="display:none;">
                <div class="card-head">
                    <h3><span class="icon" style="background:var(--purple)"><i class="fa-solid fa-link"></i></span>Video Terkait</h3>
                    <button id="refresh-related" class="a-btn" style="width:auto;height:auto;padding:6px 10px;font-size:12px;border-radius:8px;" title="Refresh"><i class="fa-solid fa-rotate"></i></button>
                </div>
                <div id="related-list" class="related-list"></div>
            </div>
        </section>

        <aside class="sidebar">
            <div class="murottal-card">
                <div class="card-head"><h3><span class="icon" style="background:var(--green)"><i class="fa-solid fa-headphones"></i></span>Murottal</h3></div>
                <div class="murottal-top">
                    <div class="murottal-cover"><i class="fa-solid fa-quran"></i></div>
                    <div class="murottal-now"><strong id="track-info">Belum dipilih</strong><span id="track-status">Siap diputar</span></div>
                </div>
                <div class="audio-controls">
                    <button id="shuffle-btn" class="a-btn" type="button" title="Acak"><i class="fa-solid fa-shuffle"></i></button>
                    <button id="prev-btn" class="a-btn" type="button" title="Sebelumnya"><i class="fa-solid fa-backward-step"></i></button>
                    <button id="toggle-audio" class="a-btn primary" type="button"><i class="fa-solid fa-play"></i></button>
                    <button id="next-btn" class="a-btn" type="button" title="Selanjutnya"><i class="fa-solid fa-forward-step"></i></button>
                    <button id="sync-btn" class="a-btn sync-btn" type="button" title="Sync"><i class="fa-solid fa-rotate-right"></i></button>
                </div>
                <div class="repeat-pill" id="repeat-pill">
                    <button class="r-opt active" data-val="0">Off</button>
                    <button class="r-opt" data-val="2">2×</button>

            {id:"MROj3NBs7Xo",title:"Cerita Ubay: Siapa Allah?",ch:"Yufid Kids",desc:"Serial Cerita Ubay untuk tampilan visual.",thumb:"https://i.ytimg.com/vi/MROj3NBs7Xo/hqdefault.jpg",dur:"--:--"},
            {id:"MLWZfKGnv6s",title:"Learn Arabic Numbers 1 to 10",ch:"Sarah Playschool",desc:"Konten visual edukatif untuk anak.",thumb:"https://i.ytimg.com/vi/MLWZfKGnv6s/hqdefault.jpg",dur:"--:--"},
            {id:"lGind6Cn0Tw",title:"I Am The Best Muslim",ch:"FreeQuranEducation",desc:"Serial islami anak ramah keluarga.",thumb:"https://i.ytimg.com/vi/lGind6Cn0Tw/hqdefault.jpg",dur:"--:--"}
        ];

        const $ = id => document.getElementById(id);
        const D = {
            q:$("search-query"), qBtn:$("search-button"),
            res:$("results"), resCount:$("results-count"), resCard:$("results-card"),
            pw:$("player-wrap"), overlay:$("overlay"), shield:$("player-shield"), expand:$("expand-btn"),
            tv:$("toggle-video"), pbar:$("progress-bar"), pval:$("progress-value"), tdisp:$("time-display"),
            title:$("current-title"), meta:$("current-meta"), vinfo:$("video-info"),
            mp:$("main-page"), loading:$("loading-more"), moreBtn:$("load-more-btn"), pinfo:$("pagination-info"),
            relSec:$("related-section"), relList:$("related-list"), relRef:$("refresh-related"),
            tlist:$("track-list"), audio:$("murottal-audio"),
            tinfo:$("track-info"), tstat:$("track-status"),
            ta:$("toggle-audio"), prev:$("prev-btn"), next:$("next-btn"),
            shuf:$("shuffle-btn"), sync:$("sync-btn"),
            vol:$("audio-volume"), vval:$("vol-val"),
            tsearch:$("murottal-search"),
            tb:$("theater-btn"), fb:$("fullscreen-btn"),
            toast:$("toast"), chips:document.querySelectorAll(".quick-chip"),
            mBar:$("mobile-bar"), mTrackName:$("m-track-name"), mTrackStatus:$("m-track-status"),
            mPlay:$("m-play"), mPrev:$("m-prev"), mNext:$("m-next"), mRep:$("m-rep"),
            repOpts:document.querySelectorAll(".r-opt"),
            blockedNotice:$("audio-blocked-notice"), unblockBtn:$("unblock-audio-btn")
        };

        const esc = t => { const d=document.createElement("div"); d.textContent=t; return d.innerHTML; };
        const fmt = s => { const m=Math.floor(s/60), sec=Math.floor(s%60); return `${String(m).padStart(2,"0")}:${String(sec).padStart(2,"0")}`; };
        const iso = d => { const m=d?.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/); if(!m)return"--:--"; const[h="00",mi="00",se="00"]=[m[1]||"0",m[2]||"0",m[3]||"0"].map(v=>String(v).padStart(2,"0")); return m[1]?`${h}:${mi}:${se}`:`${mi}:${se}`; };
        let tT;
        const toast = m => { D.toast.textContent=m; D.toast.classList.add("show"); clearTimeout(tT); tT=setTimeout(()=>D.toast.classList.remove("show"),CFG.TOAST_MS); };

        const save = () => {
            if(S.saveT) return;
            S.saveT = setTimeout(()=>{
                try{localStorage.setItem(CFG.STORAGE,JSON.stringify({q:D.q.value.trim(),r:S.results.slice(0,CFG.PER_PAGE),v:S.vid,t:S.tid,rep:S.repeat,vol:parseInt(D.vol.value),vis:D.pw.classList.contains("visible"),mini:D.pw.classList.contains("minimized"),time:S.player?.getCurrentTime?.()||0,play:S.player?.getPlayerState?.()===YT.PlayerState.PLAYING,th:S.theater,fs:S.fs,npt:S.npt,qry:S.query}));}catch(e){}
                S.saveT=null;
            },CFG.SAVE_MS);
        };

        // YT Player
        function onYouTubeIframeAPIReady(){
            S.player = new YT.Player("youtube-player",{
                host:"https://www.youtube-nocookie.com", videoId:"",
                playerVars:{autoplay:0,controls:0,fs:0,disablekb:1,iv_load_policy:3,rel:0,modestbranding:1,playsinline:1},
                events:{onReady:onReady,onStateChange:onState}
            });
        }
        function onReady(){
            S.player.mute(); S.player.setVolume(0); updateDisp();
            if(S.pending){restoreV(S.pending);S.pending=null;}
        }
        function onState(e){
            if(!S.player) return;
            S.player.mute(); S.player.setVolume(0);
            if(e.data===YT.PlayerState.PLAYING){
                S.busy=false;
                syncAudioWithVideo(); // CRITICAL FIX: Always try to sync audio when video plays
                startProg(); schedHide(); updIcons(true);
            }else if(e.data===YT.PlayerState.PAUSED){
                stopProg(); showOvl();
                if(!S.busy && !D.audio.paused) D.audio.pause();
                updIcons(false);
            }else if(e.data===YT.PlayerState.ENDED){
                stopProg(); showOvl(); updIcons(false);
                const idx=S.results.findIndex(v=>v.id===S.vid);
                if(idx>=0 && idx<S.results.length-1){
                    loadV(S.results[idx+1],{a:true,k:true});
                    toast("Berikutnya: "+S.results[idx+1].title);
                } else { if(!D.audio.paused) D.audio.pause(); }
            }
            save();
        }

        // CRITICAL FIX: Sync audio whenever video starts playing
        function syncAudioWithVideo(){
            if(!D.audio.src) selTrack(S.tid,false);
            tryPlayAudio();
        }

        function tryPlayAudio(){
            if(!D.audio.src) return;
            const p = D.audio.play();
            if(p && p.catch){
                p.catch(()=>{
                    S.audioBlocked = true;
                    D.blockedNotice.classList.add("show");
                    D.sync.classList.add("blink");
                });
            }
        }

        function startProg(){
            stopProg(); let last=-1;
            const tick=()=>{
                if(!S.player?.getCurrentTime) return;
                const c=S.player.getCurrentTime(), d=S.player.getDuration();
                if(c!==last||!S.raf){last=c; updateDisp(c,d);}
                S.raf=requestAnimationFrame(tick);
            };
            S.raf=requestAnimationFrame(tick);
        }
        function stopProg(){if(S.raf){cancelAnimationFrame(S.raf);S.raf=null;}}
        function updateDisp(c=0,d=0){
            if(!S.player?.getCurrentTime){D.tdisp.textContent="00:00 / 00:00";D.pval.style.width="0%";return;}
            c=S.player.getCurrentTime()||c; d=S.player.getDuration()||d;
            D.tdisp.textContent=`${fmt(c)} / ${fmt(d)}`;
            D.pval.style.width=d?`${(c/d)*100}%`:"0%";
        }
        function updIcons(playing){
            const icon=playing?"fa-pause":"fa-play";
            D.tv.querySelector("i").className=`fa-solid ${icon}`;
            D.ta.querySelector("i").className=`fa-solid ${icon}`;
            D.mPlay.querySelector("i").className=`fa-solid ${icon}`;
        }

        function showOvl(){D.overlay.classList.remove("hidden");}
        function schedHide(ms=1500){
            clearTimeout(S.overlayT);
            S.overlayT=setTimeout(()=>{
                if(D.pw.classList.contains("visible") && S.player?.getPlayerState?.()===YT.PlayerState.PLAYING) D.overlay.classList.add("hidden");
            },ms);
        }

        // API
        async function fetchYT(params){
            const url=new URL("https://www.googleapis.com/youtube/v3/search");
            Object.entries(params).forEach(([k,v])=>url.searchParams.set(k,v));
            const res=await fetch(url), data=await res.json();
            if(!res.ok) throw new Error(data.error?.message||"Gagal memuat");
            const ids=(data.items||[]).map(i=>i.id?.videoId).filter(Boolean);
            if(!ids.length) return {items:[],npt:null};
            const map=new Map(); const uncached=[];
            ids.forEach(id=>{ if(S.cache.has(id)) map.set(id,S.cache.get(id)); else uncached.push(id); });
            if(uncached.length){
                const u2=new URL("https://www.googleapis.com/youtube/v3/videos");
                u2.searchParams.set("part","contentDetails"); u2.searchParams.set("id",uncached.join(",")); u2.searchParams.set("key",CFG.KEY);
                const r2=await fetch(u2), d2=await r2.json();
                (d2.items||[]).forEach(i=>{ const dur=i.contentDetails?.duration||""; S.cache.set(i.id,dur); map.set(i.id,dur); });
            }
            return { items:(data.items||[]).map(i=>({id:i.id.videoId,title:i.snippet.title,ch:i.snippet.channelTitle,desc:(i.snippet.description||"").slice(0,120),thumb:i.snippet.thumbnails.medium?.url||"",dur:iso(map.get(i.id.videoId)||"")})), npt:data.nextPageToken||null };
        }

        async function search(append=false){
            const q=D.q.value.trim();
            if(!q){toast("Masukkan kata kunci pencarian.");D.q.focus();return;}
            if(!append){
                if(S.vid) minimize();
                D.qBtn.disabled=true;
                D.res.innerHTML='<div class="empty">Mencari video...</div>';
                D.loading.classList.remove("active");
                S.allResults=[]; S.results=[]; S.npt=null; S.query=q; S.more=true; S.loading=false;
            }
            S.loading=append; updPag();
            try{
                const r=await fetchYT({part:"snippet",type:"video",maxResults:String(append?CFG.PER_SCROLL:CFG.PER_PAGE),q:S.query,key:CFG.KEY,...(S.npt&&append?{pageToken:S.npt}:{})});
                if(append){S.allResults.push(...r.items);S.results.push(...r.items);}
                else{S.allResults=[...r.items];S.results=[...r.items];}
                S.npt=r.npt; S.more=!!r.npt;
                renderRes(append);
                if(!append && S.results.length){
                    const t=S.vid?S.results.find(v=>v.id===S.vid):S.results[0];
                    if(t) fetchRel(t.id).then(renderRel);
                }
            }catch(e){
                if(!append){S.results=[];S.allResults=[];renderRes();}
                toast(e.message);
            }finally{D.qBtn.disabled=false;S.loading=false;updPag();}
        }

        async function loadMore(){ if(S.loading||!S.more||!S.npt) return; await search(true); }
        async function fetchRel(vid){ if(!vid) return []; try{const r=await fetchYT({part:"snippet",type:"video",maxResults:"8",relatedToVideoId:vid,key:CFG.KEY,relevanceLanguage:"id"});return r.items;}catch(e){return[];} }

        // Render
        function mkCard(item,type="result"){
            const act=item.id===S.vid;
            const el=document.createElement("div");
            el.className=`${type}-item${act?" active":""}`;
            el.innerHTML=`<div class="${type}-thumb"><img src="${esc(item.thumb)}" alt="" loading="lazy"><span class="${type==="result"?"duration":"related-duration"}">${esc(item.dur)}</span></div><div class="${type}-body"><strong>${esc(item.title)}</strong><p>${esc(item.ch)}</p>${type==="result"?`<p>${esc(item.desc)}</p>`:""}</div>`;
            return el;
        }

        function renderRes(append=false){
            const frag=document.createDocumentFragment();
            const slice=append?S.results.slice(D.res.children.length):S.results;
            if(!append) D.res.innerHTML="";
            if(!slice.length && !append){ D.res.innerHTML='<div class="empty">Tidak ada hasil ditemukan</div>'; D.resCount.textContent="0 hasil"; updPag(); save(); return; }
            slice.forEach(item=>{
                const c=mkCard(item);
                c.addEventListener("click",()=>{loadV(item);setTimeout(()=>D.pw.scrollIntoView({behavior:'smooth',block:'start'}),50);});
                frag.appendChild(c);
            });
            D.res.appendChild(frag); D.resCount.textContent=`${S.allResults.length} hasil`; updPag(); save();
        }

        function renderRel(videos){
            if(!videos?.length){D.relSec.style.display="none";return;}
            D.relSec.style.display="block"; D.relList.innerHTML="";
            const frag=document.createDocumentFragment();
            videos.forEach(v=>{
                const el=mkCard(v,"related");
                el.addEventListener("click",()=>{loadV(v,{k:true});fetchRel(v.id).then(renderRel);setTimeout(()=>D.pw.scrollIntoView({behavior:'smooth',block:'start'}),50);});
                frag.appendChild(el);
            });
            D.relList.appendChild(frag);
        }

        function updPag(){
            const shown=Math.min(S.results.length,S.allResults.length), total=S.allResults.length;
            if(total<=CFG.PER_PAGE){D.moreBtn.style.display="none";D.pinfo.textContent=total?`Menampilkan ${total} video`:"";return;}
            D.pinfo.textContent=`Menampilkan ${shown} dari ${total} video`;
            const canLoad=S.results.length>=CFG.MAX_INLINE && S.more && !S.loading;
            D.moreBtn.style.display=canLoad?"block":"none";
            if(!canLoad && S.results.length<CFG.MAX_INLINE && S.more) D.pinfo.textContent+=" • Scroll untuk muat lebih";
            else if(!S.more) D.pinfo.textContent=`Semua ${total} video telah dimuat`;
        }

        // Video
        function loadV(item,opts={}){
            if(!S.player?.loadVideoById){toast("Player belum siap.");return;}
            S.vid=item.id; S.busy=true;
            const st=opts.start||0;
            if(opts.a!==false) S.player.loadVideoById({videoId:item.id,startSeconds:st});
            else S.player.cueVideoById({videoId:item.id,startSeconds:st});
            S.player.mute(); S.player.setVolume(0);
            D.pw.classList.add("visible"); D.pw.classList.toggle("minimized",!!opts.mini);
            D.vinfo.classList.add("visible"); D.vinfo.classList.toggle("minimized",!!opts.mini);
            showOvl(); D.pw.classList.remove("controls-hidden");
            D.title.textContent=item.title; D.meta.textContent=`${item.ch} • ${item.desc}`;
            renderRes(); fetchRel(item.id).then(renderRel); schedHide(2000);
            if(!opts.silent) save();
        }

        function minimize(){
            if(!S.vid || !D.pw.classList.contains("visible")) return;
            if(S.theater) toggleTh(); if(S.fs) toggleFs();
            D.pw.classList.add("minimized"); D.vinfo.classList.add("minimized");
            showOvl(); setTimeout(()=>D.resCard.scrollIntoView({behavior:"smooth",block:"start"}),50); save();
        }

        function togglePlay(){
            if(!S.player||!S.vid){toast("Pilih video dulu.");return;}
            S.player.getPlayerState()===YT.PlayerState.PLAYING?S.player.pauseVideo():(S.player.playVideo(),S.player.mute(),S.player.setVolume(0));
            showOvl(); schedHide();
        }

        function toggleTh(){
            S.theater=!S.theater;
            D.mp.classList.toggle("theater-mode",S.theater);
            D.pw.classList.toggle("theater",S.theater);
            D.tb.classList.toggle("active",S.theater);
            D.tb.querySelector("i").className=S.theater?"fa-solid fa-compress":"fa-solid fa-expand";
            save(); toast(S.theater?"Theater mode aktif":"Theater mode nonaktif");
        }

        function toggleFs(){
            if(!document.fullscreenElement) D.pw.requestFullscreen?.()||D.pw.webkitRequestFullscreen?.();
            else document.exitFullscreen?.()||document.webkitExitFullscreen?.();
        }
        function updFsUI(){
            S.fs=!!document.fullscreenElement;
            D.fb.querySelector("i").className=S.fs?"fa-solid fa-compress":"fa-solid fa-up-right-and-down-left-from-center";
            D.fb.classList.toggle("active",S.fs);
            document.documentElement.classList.toggle("fullscreen-active",S.fs); save();
        }

        // Tracks
        function filterTracks(q){
            const l=q.toLowerCase().trim();
            S.filtered=l?tracks.filter(t=>t.t.toLowerCase().includes(l)||t.r.toLowerCase().includes(l)):[...tracks];
            renderTracks();
        }

        function renderTracks(){
            const frag=document.createDocumentFragment();
            D.tlist.innerHTML="";
            if(!S.filtered.length){D.tlist.innerHTML='<div class="track-item no-results">Tidak ada hasil</div>';return;}
            S.filtered.forEach(t=>{
                const idx=tracks.findIndex(a=>a.id===t.id);
                const b=document.createElement("button");
                b.type="button"; b.className=`track-item${idx===S.tid?" active":""}`;
                b.innerHTML=`<div class="num">${t.id}</div><div class="info"><strong>${esc(t.t)}</strong><span>${esc(t.r)}</span></div>`;
                b.addEventListener("click",()=>selTrack(idx,true));
                frag.appendChild(b);
            });
            D.tlist.appendChild(frag);
        }

        // Repeat UI
        function setRepeat(val){
            S.repeat = parseInt(val);
            D.repOpts.forEach(o=>o.classList.toggle("active",parseInt(o.dataset.val)===S.repeat));
            D.mRep.classList.toggle("active",S.repeat>0);
            updStatus(); save();
            if(S.repeat>0) toast(`Pengulangan ${S.repeat}×`);
            else toast("Pengulangan nonaktif");
        }

        function updStatus(){
            if(D.audio.paused){
                D.tstat.textContent="Dijeda"; D.mTrackStatus.textContent="Dijeda";
            } else {
                if(S.repeat>0) {
                    D.tstat.textContent=`Ulang ${S.repeat}×`; D.mTrackStatus.textContent=`Ulang ${S.repeat}×`;
                } else {
                    D.tstat.textContent="Sedang diputar"; D.mTrackStatus.textContent="Diputar";
                }
            }
        }

        function selTrack(idx,auto=true){
            S.tid=idx;
            D.audio.src=tracks[idx].f; D.audio.load();
            const name=tracks[idx].t;
            D.tinfo.textContent=name; D.mTrackName.textContent=name;
            updStatus(); renderTracks(); save();
            if(auto){
                tryPlayAudio();
            }
        }

        function playRandom(){
            if(tracks.length<2) return selTrack(S.tid,true);
            let n=S.tid; while(n===S.tid) n=Math.floor(Math.random()*tracks.length);
            selTrack(n,true); toast(`Acak: ${tracks[n].t}`);
        }

        function toggleAudio(){
            if(!D.audio.src) selTrack(S.tid,false);
            D.audio.paused ? tryPlayAudio() : D.audio.pause();
        }

        // Unblock audio on user interaction
        function unblockAudio(){
            D.audio.play().then(()=>{
                S.audioBlocked = false;
                D.blockedNotice.classList.remove("show");
                D.sync.classList.remove("blink");
                updStatus();
            }).catch(()=>{});
        }

        function restore(){
            try{
                const raw=localStorage.getItem(CFG.STORAGE);
                if(!raw){S.results=defaults;S.allResults=[...defaults];renderRes();return;}
                const s=JSON.parse(raw);
                D.q.value=s.q||"";
                S.results=Array.isArray(s.r)&&s.r.length?s.r:defaults;
                S.allResults=[...S.results];
                S.tid=Number.isInteger(s.t)?Math.min(Math.max(s.t,0),tracks.length-1):0;
                S.repeat=Number(s.rep)||0;
                D.vol.value=String(Math.max(0,Math.min(100,Number(s.vol)||72)));
                D.audio.volume=D.vol.value/100; D.vval.textContent=`${D.vol.value}%`;
                S.npt=s.npt||null; S.query=s.qry||"";
                S.theater=!!s.th; S.fs=!!s.fs;
                D.mp.classList.toggle("theater-mode",S.theater);
                D.pw.classList.toggle("theater",S.theater);
                D.tb.classList.toggle("active",S.theater);
                D.tb.querySelector("i").className=S.theater?"fa-solid fa-compress":"fa-solid fa-expand";
                updFsUI(); renderRes(); updPag();
                selTrack(S.tid,false); updStatus();
                D.repOpts.forEach(o=>o.classList.toggle("active",parseInt(o.dataset.val)===S.repeat));
                D.mRep.classList.toggle("active",S.repeat>0);
                if(s.v) S.pending=s;
            }catch(e){console.error(e);S.results=defaults;S.allResults=[...defaults];renderRes();selTrack(S.tid,false);}
        }

        function restoreV(s){
            if(!S.player||!s?.v) return;
            const item=S.results.find(i=>i.id===s.v);
            if(!item) return;
            loadV(item,{start:s.time||0,auto:!!s.play,mini:!!s.mini,silent:true,k:true});
        }

        // Observer
        function setupObs(){
            const sent=document.createElement("div"); sent.style.height="1px"; sent.style.visibility="hidden";
            D.resCard.appendChild(sent);
            S.observer=new IntersectionObserver(([e])=>{
                if(e.isIntersecting && !S.loading && S.more && S.results.length<CFG.MAX_INLINE) loadMore();
            },{rootMargin:`${CFG.SCROLL_TH}px`});
            S.observer.observe(sent);
        }

        // Events
        function setupEvents(){
            D.tv.addEventListener("click",togglePlay);
            D.shield.addEventListener("click",togglePlay);
            D.expand.addEventListener("click",()=>{D.pw.classList.remove("minimized");D.vinfo.classList.remove("minimized");save();setTimeout(()=>D.pw.scrollIntoView({behavior:'smooth',block:'start'}),50);});
            D.pbar.addEventListener("click",e=>{
                if(!S.player?.getDuration) return;
                const r=D.pbar.getBoundingClientRect();
                S.player.seekTo(S.player.getDuration()*Math.max(0,Math.min(1,(e.clientX-r.left)/r.width)),true);
                showOvl(); schedHide();
            });

            D.ta.addEventListener("click",toggleAudio);
            D.prev.addEventListener("click",()=>selTrack((S.tid-1+tracks.length)%tracks.length,true));
            D.next.addEventListener("click",()=>selTrack((S.tid+1)%tracks.length,true));
            D.shuf.addEventListener("click",playRandom);
            D.sync.addEventListener("click",()=>{
                if(!S.vid) return toast("Pilih video dulu.");
                selTrack(S.tid,true); D.audio.currentTime=0;
                unblockAudio();
            });

            D.repOpts.forEach(btn=>{
                btn.addEventListener("click",()=>setRepeat(btn.dataset.val));
            });

            D.vol.addEventListener("input",()=>{D.audio.volume=D.vol.value/100;D.vval.textContent=`${D.vol.value}%`;save();});

            // Audio events
            D.audio.addEventListener("play",()=>{
                S.audioBlocked=false;
                D.blockedNotice.classList.remove("show");
                D.sync.classList.remove("blink");
                updStatus();save();
            });
            D.audio.addEventListener("pause",()=>{updStatus();save();});
            D.audio.addEventListener("ended",()=>{
                if(S.repeat > 1){
                    S.repeat--;
                    D.audio.currentTime=0; D.audio.play().catch(()=>{});
                    toast(`Mengulang... sisa ${S.repeat}×`);
                } else if(S.repeat === 1){
                    S.repeat = 0;
                    const nextIdx=(S.tid+1)%tracks.length;
                    selTrack(nextIdx,true);
                } else {
                    const nextIdx=(S.tid+1)%tracks.length;
                    selTrack(nextIdx,true);
                }
                updStatus(); save();
            });
            D.audio.addEventListener("error",()=>{D.tstat.textContent="Error";toast("Gagal memuat audio.");});

            D.qBtn.addEventListener("click",()=>search());
            D.q.addEventListener("keydown",e=>{if(e.key==="Enter")search();});
            D.chips.forEach(b=>b.addEventListener("click",()=>{D.q.value=b.dataset.query;search();}));

            let st; D.tsearch.addEventListener("input",e=>{clearTimeout(st);st=setTimeout(()=>filterTracks(e.target.value),180);});

            D.tb.addEventListener("click",toggleTh);
            D.fb.addEventListener("click",toggleFs);
            document.addEventListener("fullscreenchange",updFsUI);
            document.addEventListener("webkitfullscreenchange",updFsUI);
            document.addEventListener("keydown",e=>{
                if(document.activeElement.matches("input,textarea"))return;
                const k=e.key.toLowerCase();
                if(k==="f"&&D.pw.classList.contains("visible")){e.preventDefault();toggleFs();}
                if(k==="t"&&D.pw.classList.contains("visible")){e.preventDefault();toggleTh();}
                if(k===" "){e.preventDefault();togglePlay();}
                if(k==="escape"&&(S.fs||S.theater)){if(S.fs)toggleFs();if(S.theater)toggleTh();}
            });

            D.moreBtn.addEventListener("click",()=>{if(S.npt&&!S.loading)loadMore();});
            D.relRef.addEventListener("click",()=>{if(S.vid){toast("Memuat...");fetchRel(S.vid).then(renderRel);}});

            D.mPlay.addEventListener("click",toggleAudio);
            D.mPrev.addEventListener("click",()=>selTrack((S.tid-1+tracks.length)%tracks.length,true));
            D.mNext.addEventListener("click",()=>selTrack((S.tid+1)%tracks.length,true));
            D.mRep.addEventListener("click",()=>{
                const vals=[0,2,3,5,10];
                const ci=vals.indexOf(S.repeat);
                setRepeat(vals[(ci+1)%vals.length]);
            });

            D.unblockBtn.addEventListener("click", unblockAudio);
            // Also allow clicking anywhere on the page to unblock audio
            document.addEventListener("click", ()=>{
                if(S.audioBlocked && !D.audio.paused){
                    unblockAudio();
                }
            }, {once:true});

            window.addEventListener("beforeunload",save);
        }

        function init(){
            restore(); setupEvents(); setupObs();
            if(!D.tlist.children.length){renderTracks();selTrack(S.tid,false);D.audio.volume=D.vol.value/100;}
        }
        document.readyState==="loading"?document.addEventListener("DOMContentLoaded",init):init();
    </script>
</body>
</html>
