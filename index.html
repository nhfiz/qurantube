<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Murottal Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --bg: #f8f7f3;
            --surface: #ffffff;
            --surface-soft: #f4f4f0;
            --line: #e8e6df;
            --text: #142018;
            --muted: #6d786e;
            --accent: #1d5d47;
            --accent-dark: #154434;
            --green: #116149;
            --green-soft: #e8f4ef;
            --radius: 16px;
            --shadow-soft: 0 8px 20px rgba(30, 36, 32, 0.06);
            --shadow-strong: 0 16px 28px rgba(30, 36, 32, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        html.fullscreen-active body { overflow: hidden; }
        body { font-family: "Plus Jakarta Sans", sans-serif; background: var(--surface); color: var(--text); }
        button, input { font: inherit; }

        .topbar {
            position: sticky; top: 0; z-index: 20;
            background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--line);
        }
        html.fullscreen-active .topbar { display: none; }
        .topbar-inner { max-width: 1380px; margin: 0 auto; padding: 12px 18px; display: grid; grid-template-columns: 220px minmax(0, 1fr); gap: 16px; align-items: center; }
        .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; white-space: nowrap; }
        .brand i { color: var(--accent); font-size: 28px; }
        .searchbar { display: grid; grid-template-columns: minmax(0, 1fr) 56px; gap: 10px; align-items: center; }
        .search-input { width: 100%; border: 1px solid #d8d8d1; background: #fff; border-radius: 999px; padding: 12px 16px; color: var(--text); }
        .search-input:focus { outline: none; border-color: #8ab4f8; box-shadow: 0 0 0 3px rgba(138, 180, 248, 0.15); }
        .search-button { border: 1px solid #d8d8d1; background: var(--surface-soft); border-radius: 999px; cursor: pointer; height: 46px; transition: background 0.15s; }
        .search-button:hover { background: var(--green-soft); }
        .search-button:disabled { opacity: 0.5; cursor: not-allowed; }

        .page { max-width: 1380px; margin: 22px auto 40px; padding: 0 18px; display: grid; grid-template-columns: minmax(0, 1.55fr) 380px; gap: 24px; align-items: start; transition: grid-template-columns 0.3s ease; }
        .page.theater-mode { grid-template-columns: 1fr; max-width: 100%; padding: 0 24px; }
        .page.theater-mode .watch-column { grid-template-columns: 1fr; }
        .page.theater-mode .sidebar { position: static; width: 100%; max-width: 720px; margin: 0 auto; }
        .page.theater-mode .murottal-card { border-radius: 0 0 var(--radius) var(--radius); border-top: none; margin-top: -1px; }
        .watch-column { min-width: 0; display: grid; gap: 16px; }

        .quick-chips { display: flex; flex-wrap: wrap; gap: 10px; }
        .quick-chip { border: 1px solid var(--line); background: var(--surface); color: var(--text); border-radius: 999px; padding: 10px 14px; font-size: 13px; font-weight: 600; cursor: pointer; transition: background 0.15s, border-color 0.15s; }
        .quick-chip:hover { background: var(--green-soft); border-color: var(--accent); }

        .player-wrap {
            background: #000; border-radius: 18px; overflow: hidden; aspect-ratio: 16 / 9;
            display: none; box-shadow: var(--shadow-strong); position: relative;
            transition: border-radius 0.3s ease, box-shadow 0.3s ease, max-width 0.3s ease;
        }
        .player-wrap.visible { display: block; }
        .player-wrap.minimized {
            max-width: 340px; margin-left: auto; aspect-ratio: 16 / 9;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.2);
            position: fixed; bottom: 30px; right: 30px; border-radius: 12px; z-index: 50;
            animation: slideUp 0.25s ease-out;
        }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .page.theater-mode .player-wrap.theater { border-radius: var(--radius) var(--radius) 0 0; box-shadow: none; margin: 0; width: 100%; max-width: 720px; margin-left: auto; margin-right: auto; }
        .player-wrap.controls-hidden .player-overlay { opacity: 0; }

        .player-wrap:fullscreen, .player-wrap:-webkit-full-screen, .player-wrap:-moz-full-screen, .player-wrap:-ms-fullscreen {
            width: 100vw; height: 100vh; border-radius: 0; margin: 0; display: block !important; position: fixed; top: 0; left: 0; z-index: 1000;
        }

        #youtube-player { width: 100%; height: 100%; }
        .player-shield { position: absolute; inset: 0; z-index: 1; background: transparent; }

        .player-overlay {
            position: absolute; inset: 0; z-index: 2;
            display: flex; flex-direction: column; justify-content: space-between;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.22), transparent 28%, transparent 62%, rgba(0, 0, 0, 0.68));
            pointer-events: none; transition: opacity 0.22s ease, visibility 0.22s ease;
        }
        .player-overlay.hidden { display: none; }
        .player-bottom { pointer-events: auto; padding: 16px; display: flex; align-items: center; gap: 12px; position: absolute; bottom: 0; width: 100%; flex-wrap: wrap; }
        .player-wrap.controls-hidden .player-bottom { pointer-events: none; }

        .player-progress { display: grid; gap: 8px; width: 100%; max-width: calc(100% - 200px); }
        .player-controls { display: flex; flex-wrap: wrap; gap: 10px; flex-shrink: 0; }
        .player-control-button { border: none; border-radius: 999px; padding: 10px 14px; background: rgba(255, 255, 255, 0.16); color: #fff; cursor: pointer; font-weight: 700; backdrop-filter: blur(8px); display: flex; align-items: center; gap: 6px; font-size: 13px; transition: background 0.15s; }
        .player-control-button.primary { background: transparent; backdrop-filter: blur(20px); }
        .player-control-button:hover { background: rgba(255, 255, 255, 0.28); }

        .video-info { margin-top: 16px; display: none; gap: 12px; }
        .video-info.visible { display: grid; }
        .video-info.minimized { display: none; }
        .page.theater-mode .video-info.visible { max-width: 720px; margin: 16px auto 0; padding: 0 12px; }
        .video-title { font-size: clamp(20px, 2.3vw, 26px); line-height: 1.35; font-weight: 700; letter-spacing: -0.02em; }
        .video-meta { display: flex; flex-wrap: wrap; gap: 10px; color: var(--muted); font-size: 14px; }
        .meta-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 999px; background: var(--surface-soft); color: var(--muted); font-weight: 600; }

        .murottal-card, .results-card, .related-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow-soft); }
        
        .card-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
        .card-head h3 { font-size: 16px; }
        .card-head span { color: var(--muted); font-size: 13px; }
        
        .progress-bar { height: 8px; border-radius: 999px; overflow: hidden; margin-bottom: 8px; cursor: pointer; position: relative; background: rgba(255,255,255,0.2); }
        .progress-value { height: 100%; width: 0%; background: linear-gradient(315deg, #EF0F46, #EF889E); border-radius: 20px; position: relative; transition: width 0.1s linear; }
        .progress-text { color: #fff; font-size: 13px; text-wrap: nowrap; font-weight: 500; }

        .murottal-player { display: grid; gap: 14px; }
        .murottal-top { display: grid; grid-template-columns: 54px minmax(0, 1fr); gap: 12px; align-items: center; }
        .murottal-cover { width: 54px; height: 54px; border-radius: 999px; background: linear-gradient(135deg, #1a5f49, #b78a2e); color: #fff; display: grid; place-items: center; box-shadow: 0 12px 24px rgba(26, 95, 73, 0.18); font-size: 20px; }
        .murottal-now { min-width: 0; }
        .murottal-now strong { display: block; font-size: 14px; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .murottal-now span { color: var(--muted); font-size: 12px; }
        .murottal-buttons { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; align-items: center; }
        .icon-button, .tool-button { width: 100%; height: 44px; border-radius: 14px; border: none; cursor: pointer; color: var(--text); background: transparent; transition: background 0.15s ease; }
        .icon-button:hover, .tool-button:hover { background: var(--surface-soft); }
        .icon-button.primary-icon { background: linear-gradient(180deg, var(--accent), var(--accent-dark)); color: var(--surface); width: 50px; height: 50px; border-radius: 40px; display: grid; place-items: center; margin: 0 auto; box-shadow: var(--accent) 0px 10px 20px -10px; transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .icon-button.primary-icon:hover { transform: scale(1.05); box-shadow: var(--accent) 0px 14px 28px -10px; }
        
        .murottal-search { margin: 20px 0; position: relative; }
        .murottal-search input { width: 100%; border: 1px solid var(--line); background: var(--surface-soft); border-radius: 12px; padding: 10px 14px 10px 36px; color: var(--text); font-size: 13px; transition: border-color 0.2s ease, box-shadow 0.2s ease; }
        .murottal-search input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(29, 93, 71, 0.1); }
        .murottal-search i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 12px; pointer-events: none; }
        
        .track-list { display: grid; gap: 10px; margin: 12px 0 0; max-height: 340px; overflow-y: auto; padding-right: 4px; }
        .track-list::-webkit-scrollbar { width: 6px; }
        .track-list::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }
        .track-item { width: 100%; text-align: left; border: 1px solid var(--line); background: #fff; border-radius: 14px; padding: 12px 14px; cursor: pointer; transition: border-color 0.18s ease, transform 0.1s ease; }
        .track-item:hover { transform: translateX(2px); border-color: var(--accent); }
        .track-item.active { border-color: #98c8b8; background: var(--green-soft); box-shadow: 0 10px 24px rgba(17, 97, 73, 0.12); }
        .track-item strong { display: block; font-size: 14px; margin-bottom: 3px; }
        .track-item span { font-size: 12px; color: var(--muted); }
        .track-item.no-results { text-align: center; padding: 20px; color: var(--muted); cursor: default; border: none; background: transparent; }

        .repeat-section { margin-top: 16px; }
        .repeat-controls { display: flex; align-items: center; gap: 10px; background: var(--surface-soft); border-radius: 12px; padding: 8px; border: 1px solid var(--line); }
        .repeat-btn { width: 32px; height: 32px; border-radius: 8px; border: none; background: #fff; color: var(--text); cursor: pointer; display: grid; place-items: center; font-weight: 600; transition: background 0.15s ease, transform 0.1s ease; }
        .repeat-btn:hover { background: var(--green-soft); color: var(--green); }
        .repeat-btn:active { transform: scale(0.95); }
        .repeat-display { flex: 1; text-align: center; font-weight: 700; color: var(--accent); font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 4px; }
        .repeat-display i { color: var(--green); font-size: 13px; }
        .repeat-status { color: var(--muted); font-size: 12px; margin-top: 6px; line-height: 1.5; display: flex; align-items: center; gap: 6px; }
        .repeat-progress { flex: 1; height: 4px; background: var(--line); border-radius: 2px; overflow: hidden; }
        .repeat-progress-bar { height: 100%; background: linear-gradient(90deg, var(--green), var(--accent)); border-radius: 2px; transition: width 0.3s ease; }
        .volume-wrap { margin-top: 16px; }
        .volume-slider { display: flex; align-items: center; gap: 10px; }
        input[type="range"] { width: 100%; accent-color: var(--green); cursor: pointer; }

        .sidebar { min-width: 0; display: grid; gap: 16px; position: sticky; top: 84px; align-self: start; transition: opacity 0.3s ease; }
        .results { display: grid; gap: 12px; }
        .result-item { display: grid; grid-template-columns: 168px minmax(0, 1fr); gap: 10px; background: #fff; border-radius: 14px; cursor: pointer; padding: 8px; border: 1px solid transparent; transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.1s ease; }
        .result-item:hover { border-color: var(--line); box-shadow: var(--shadow-soft); transform: translateY(-1px); }
        .result-item.active .result-thumb, .result-item:hover .result-thumb { outline: 2px solid var(--accent); }
        .result-thumb { position: relative; aspect-ratio: 16 / 9; border-radius: 12px; overflow: hidden; background: #000; outline: 2px solid transparent; transition: outline-color 0.2s ease; }
        .result-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .duration { position: absolute; right: 8px; bottom: 8px; background: rgba(0, 0, 0, 0.8); color: #fff; border-radius: 6px; padding: 3px 6px; font-size: 11px; font-weight: 700; }
        .result-body { min-width: 0; padding: 2px 0; }
        .result-body strong { display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2; overflow: hidden; font-size: 15px; line-height: 1.4; margin-bottom: 6px; }
        .result-body p { color: var(--muted); font-size: 12px; line-height: 1.5; display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2; overflow: hidden; }
        .empty { padding: 14px; border-radius: 14px; background: var(--surface-soft); color: var(--muted); font-size: 14px; text-align: center; }

        .loading-more { text-align: center; padding: 16px; color: var(--muted); display: none; }
        .loading-more.active { display: block; }
        .loading-more i { animation: spin 1s linear infinite; margin-right: 8px; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .load-more-btn { width: 100%; padding: 12px; margin-top: 10px; border: 1px solid var(--line); background: var(--surface-soft); border-radius: 12px; color: var(--text); font-weight: 600; cursor: pointer; transition: background 0.15s ease; }
        .load-more-btn:hover:not(:disabled) { background: var(--green-soft); border-color: var(--accent); }
        .load-more-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .pagination-info { text-align: center; color: var(--muted); font-size: 12px; margin-top: 6px; min-height: 18px; }

        .related-list { display: grid; gap: 10px; }
        .related-item { display: grid; grid-template-columns: 120px minmax(0, 1fr); gap: 10px; background: #fff; border-radius: 12px; cursor: pointer; padding: 6px; border: 1px solid transparent; transition: border-color 0.18s ease, box-shadow 0.18s ease; }
        .related-item:hover, .related-item.active { border-color: var(--line); box-shadow: var(--shadow-soft); }
        .related-item.active .related-thumb { outline: 2px solid var(--accent); }
        .related-thumb { position: relative; aspect-ratio: 16 / 9; border-radius: 10px; overflow: hidden; background: #000; outline: 2px solid transparent; transition: outline-color 0.2s ease; }
        .related-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .related-body strong { display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2; overflow: hidden; font-size: 14px; line-height: 1.3; margin-bottom: 4px; }
        .related-body p { color: var(--muted); font-size: 11px; }
        .related-duration { position: absolute; right: 6px; bottom: 6px; background: rgba(0, 0, 0, 0.8); color: #fff; border-radius: 4px; padding: 2px 5px; font-size: 10px; font-weight: 600; }

        .toast { position: fixed; left: 50%; bottom: 20px; transform: translateX(-50%) translateY(10px); background: rgba(15, 15, 15, 0.95); color: #fff; padding: 12px 16px; border-radius: 999px; font-size: 13px; opacity: 0; pointer-events: none; transition: opacity 0.2s ease, transform 0.2s ease; z-index: 100; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        .player-expand-btn {
            position: absolute; top: 0; right: 0; z-index: 6; width: 100%; height: 100%;
            border-radius: 10px; border: none; background: transparent; color: #fff; cursor: pointer;
            display: none; align-items: center; justify-content: center; font-size: 24px;
            transition: background 0.2s, opacity 0.2s; opacity: 0;
        }
        .player-wrap.minimized .player-expand-btn { display: flex; }
        .player-expand-btn:hover { background: rgba(0,0,0,0.5); opacity: 1; }

        .player-wrap.minimized .player-shield { pointer-events: auto !important; z-index: 3; }
        .player-wrap.minimized .player-overlay { opacity: 1 !important; visibility: visible !important; pointer-events: auto !important; }
        .player-wrap.minimized .player-overlay.hidden { display: flex !important; opacity: 1 !important; }
        .player-wrap.minimized .player-bottom { opacity: 0; pointer-events: none !important; transition: opacity 0.2s ease; }

        .player-wrap:hover .player-overlay { opacity: 1 !important; visibility: visible !important; }
        .player-wrap:hover .player-bottom { pointer-events: auto !important; }
        .player-wrap.controls-hidden .player-overlay { opacity: 0; visibility: hidden; }
        .player-wrap:hover.controls-hidden .player-overlay { opacity: 1 !important; visibility: visible !important; }

        @media (max-width: 1100px) { .page { grid-template-columns: 1fr; } }
        @media (max-width: 760px) {
            .topbar-inner { grid-template-columns: 1fr; }
            .searchbar, .result-item { grid-template-columns: 1fr; }
            .page { padding: 0 12px; margin-top: 14px; }
            .sidebar { position: static; }
            .player-bottom { padding: 12px; gap: 8px; }
            .player-control-button { padding: 8px 12px; font-size: 12px; }
            .player-progress { max-width: calc(100% - 140px); }
            .murottal-buttons { grid-template-columns: repeat(5, 1fr); gap: 6px; }
            .icon-button, .tool-button { height: 40px; }
            .icon-button.primary-icon { width: 44px; height: 44px; }
            .page.theater-mode .player-wrap.theater { max-width: 100%; margin: 0; }
            .page.theater-mode .video-info.visible, .page.theater-mode .sidebar { max-width: 100%; padding: 0 4px; }
            .related-item { grid-template-columns: 100px minmax(0, 1fr); }
            .player-expand-btn { width: 30px; height: 30px; top: 8px; right: 8px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <div class="brand"><i class="fa-brands fa-youtube"></i><span>YouTube Murottal</span></div>
            <div class="searchbar">
                <input id="search-query" class="search-input" type="text" placeholder="Telusuri video visual untuk diputar tanpa suara">
                <button id="search-button" class="search-button" type="button" aria-label="Cari"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
        </div>
    </header>

    <main class="page" id="main-page">
        <section class="watch-column">
            <div class="player-wrap" id="player-wrap">
                <div id="youtube-player"></div>
                <div id="player-shield" class="player-shield" aria-hidden="true"></div>
                <button id="player-expand-btn" class="player-expand-btn" type="button" title="Perbesar player"><i class="fa-solid fa-up-right-and-down-left-from-center"></i></button>
                <div id="player-overlay" class="player-overlay">
                    <div class="player-bottom">
                        <div class="player-controls">
                            <button id="toggle-video" class="player-control-button primary" type="button" aria-label="Play pause video"><i class="fa-solid fa-play"></i></button>
                        </div>
                        <div class="player-progress">
                            <div class="progress-bar" id="progress-bar"><div id="progress-value" class="progress-value"></div></div>
                        </div>
                        <div id="time-display" class="progress-text">00:00 / 00:00</div>
                        <button id="theater-btn" class="player-control-button theater-btn" type="button" aria-label="Theater mode" title="Theater Mode"><i class="fa-solid fa-expand"></i></button>
                        <button id="fullscreen-btn" class="player-control-button fullscreen-btn" type="button" aria-label="Fullscreen" title="Fullscreen"><i class="fa-solid fa-up-right-and-down-left-from-center"></i></button>
                    </div>
                </div>
            </div>

            <div class="video-info">
                <h1 id="current-title" class="video-title">Belum ada video dipilih</h1>
                <div class="video-meta"><div id="current-meta" class="meta-badge">Pilih salah satu video dari daftar di bawah</div></div>
            </div>

            <div class="results-card">
                <div class="card-head">
                    <h3>Daftar Video</h3><span id="results-count">0 hasil</span>
                </div>
                <div class="quick-chips" style="margin-bottom:14px;">
                    <button class="quick-chip" type="button" data-query="nussa rarra">Nussa Rarra</button>
                    <button class="quick-chip" type="button" data-query="cerita ubay">Cerita Ubay</button>
                    <button class="quick-chip" type="button" data-query="sarah playschool">Sarah Playschool</button>
                    <button class="quick-chip" type="button" data-query="kartun islami anak">Kartun Islami</button>
                </div>
                <div id="results" class="results"><div class="empty">Cari video dari kolom pencarian di atas.</div></div>
                <div id="loading-more" class="loading-more"><i class="fa-solid fa-spinner"></i></div>
                <button id="load-more-btn" class="load-more-btn" style="display:none;"><i class="fa-solid fa-plus"></i> Muat Lebih Banyak</button>
                <div id="pagination-info" class="pagination-info"></div>
            </div>

            <div class="related-card" id="related-section" style="display:none;">
                <div class="card-head">
                    <h3><i class="fa-solid fa-link" style="color:var(--accent);margin-right:6px;"></i>Video Terkait</h3>
                    <button id="refresh-related" class="tool-button" style="width:auto;padding:6px 12px;font-size:12px;" title="Refresh rekomendasi"><i class="fa-solid fa-rotate"></i></button>
                </div>
                <div id="related-list" class="related-list"></div>
            </div>
        </section>

        <aside class="sidebar">
            <div class="murottal-card">
                <div class="card-head"><h3>Murottal</h3><span><i class="fa-solid fa-headphones-simple"></i></span></div>
                <div class="murottal-player">
                    <div class="murottal-top">
                        <div class="murottal-cover"><i class="fa-solid fa-music"></i></div>
                        <div class="murottal-now"><strong id="selected-track-info">Belum ada track dipilih.</strong><span id="audio-mini-status">Siap diputar</span></div>
                    </div>
                    <div class="murottal-buttons">
                        <button id="shuffle-track" class="tool-button" type="button"><i class="fa-solid fa-shuffle"></i></button>
                        <button id="prev-track" class="icon-button" type="button"><i class="fa-solid fa-backward-step"></i></button>
                        <button id="toggle-audio" class="icon-button primary-icon" type="button"><i class="fa-solid fa-play"></i></button>

            if (!state.player) return;

            if (e.data === YT.PlayerState.PLAYING) {
                state.transitioning = false;

                if (dom.audio.paused) dom.audio.play().catch(() => {});
                startProgressLoop(); scheduleHide(); updatePlayIcons(true);
            } else if (e.data === YT.PlayerState.PAUSED) {
                stopProgressLoop(); showOverlay();
                if (!state.transitioning && !dom.audio.paused) dom.audio.pause();
                updatePlayIcons(false);
            } else if (e.data === YT.PlayerState.ENDED) {
                stopProgressLoop(); showOverlay(); updatePlayIcons(false);
                const idx = state.searchResults.findIndex(v => v.id === state.selectedVideoId);
                if (idx >= 0 && idx < state.searchResults.length - 1) {
                    loadVideo(state.searchResults[idx + 1], { auto: true, keep: true });
                    showToast("Berikutnya: " + state.searchResults[idx + 1].title);
                } else {
                    if (!dom.audio.paused) dom.audio.pause();
                }
            }
            saveState();
        }

        function startProgressLoop() {
            stopProgressLoop();
            let last = -1;
            const tick = () => {
                if (!state.player?.getCurrentTime) return;
                const cur = state.player.getCurrentTime();
                const dur = state.player.getDuration();
                if (cur !== last || !state.progressFrame) {
                    last = cur;
                    updateDisplay(cur, dur);
                }
                state.progressFrame = requestAnimationFrame(tick);
            };
            state.progressFrame = requestAnimationFrame(tick);
        }

        function stopProgressLoop() {
            if (state.progressFrame) { cancelAnimationFrame(state.progressFrame); state.progressFrame = null; }
        }

                return;
            }
            c = state.player.getCurrentTime() || c;
            d = state.player.getDuration() || d;
            dom.timeDisplay.textContent = `${fmt(c)} / ${fmt(d)}`;
            dom.progressValue.style.width = d ? `${(c / d) * 100}%` : "0%";
        }

        function updatePlayIcons(playing) {
            const icon = playing ? "fa-pause" : "fa-play";
            dom.toggleVideo.querySelector("i").className = `fa-solid ${icon}`;
            dom.toggleAudio.querySelector("i").className = `fa-solid ${dom.audio.paused ? "fa-play" : "fa-pause"}`;
        }

        // === OVERLAY MANAGEMENT ===
        function showOverlay() { dom.overlay.classList.remove("hidden"); dom.overlay.style.opacity = "1"; }
        function hideOverlay() { dom.overlay.classList.add("hidden"); }
        function scheduleHide(delay = 1500) {
            clearTimeout(state.overlayTimer);
            state.overlayTimer = setTimeout(() => {
                if (dom.playerWrap.classList.contains("visible") && state.player?.getPlayerState?.() === YT.PlayerState.PLAYING) {
                    hideOverlay();
                }
            }, delay);
        }

        // === API FUNCTIONS ===
        async function fetchWithDurations(params) {
            const url = new URL("https://www.googleapis.com/youtube/v3/search");
            Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
            
            const res = await fetch(url);
            const data = await res.json();
            if (!res.ok) throw new Error(data.error?.message || "Gagal memuat");

            const ids = (data.items || []).map(i => i.id?.videoId).filter(Boolean);
            if (!ids.length) return { items: [], npt: null };

            const cached = [], uncached = [];
            ids.forEach(id => state.durationCache.has(id) ? cached.push({ id, dur: state.durationCache.get(id) }) : uncached.push(id));

            const map = new Map(cached.map(c => [c.id, c.dur]));
            if (uncached.length) {
                const u2 = new URL("https://www.googleapis.com/youtube/v3/videos");
                u2.searchParams.set("part", "contentDetails");
                u2.searchParams.set("id", uncached.join(","));
                u2.searchParams.set("key", CONFIG.API_KEY);
                const r2 = await fetch(u2);
                const d2 = await r2.json();
                (d2.items || []).forEach(i => {
                    const dur = i.contentDetails?.duration || "";
                    state.durationCache.set(i.id, dur);
                    map.set(i.id, dur);
                });
            }

            return {
                items: (data.items || []).map(i => ({
                    id: i.id.videoId, title: i.snippet.title, channelTitle: i.snippet.channelTitle,
                    description: (i.snippet.description || "").slice(0, 120),
                    thumbnail: i.snippet.thumbnails.medium?.url || "", durationLabel: isoToClock(map.get(i.id.videoId) || "")
                })),
                npt: data.nextPageToken || null
            };
        }

        async function searchVideos(append = false) {
            const q = dom.searchInput.value.trim();
            if (!q) { showToast("Masukkan kata kunci pencarian."); dom.searchInput.focus(); return; }

            if (!append) {
                minimizeForSearch();
                dom.searchBtn.disabled = true;
                dom.results.innerHTML = '<div class="empty">Mengambil data...</div>';
                dom.loading.classList.remove("active");
                state.allResults = []; state.searchResults = [];
                state.nextPageToken = null; state.query = q;
                state.hasMore = true; state.isLoading = false;
            }

            state.isLoading = append; updatePagination();

            try {
                const r = await fetchWithDurations({
                    part: "snippet", type: "video",
                    maxResults: String(append ? CONFIG.ITEMS_PER_SCROLL : CONFIG.ITEMS_PER_PAGE),
                    q: state.query, key: CONFIG.API_KEY,
                    ...(state.nextPageToken && append ? { pageToken: state.nextPageToken } : {})
                });

                if (append) {
                    state.allResults.push(...r.items);
                    state.searchResults.push(...r.items);
                } else {
                    state.allResults = [...r.items];
                    state.searchResults = [...r.items];
                }
                state.nextPageToken = r.npt;
                state.hasMore = !!r.npt;
                renderResults(append);

                if (!append && state.searchResults.length) {
                    const t = state.selectedVideoId 
                        ? state.searchResults.find(v => v.id === state.selectedVideoId) 
                        : state.searchResults[0];
                    if (t) fetchRelated(t.id).then(renderRelated);
                }
            } catch (e) {
                if (!append) { state.searchResults = []; state.allResults = []; renderResults(); }
                showToast(e.message);
            } finally {
                dom.searchBtn.disabled = false;
                state.isLoading = false;
                updatePagination();
            }
        }

        async function loadMore() {
            if (state.isLoading || !state.hasMore || !state.nextPageToken) return;
            await searchVideos(true);
        }

        async function fetchRelated(vid) {
            if (!vid) return [];
            try {
                const r = await fetchWithDurations({
                    part: "snippet", type: "video", maxResults: "8",
                    relatedToVideoId: vid, key: CONFIG.API_KEY, relevanceLanguage: "id"
                });
                return r.items;
            } catch (e) { console.error(e); return []; }
        }

        // === RENDERING ===
        function createItem(item, type = "result") {
            const active = item.id === state.selectedVideoId;
            const el = document.createElement("div");
            el.className = `${type}-item${active ? " active" : ""}`;
            el.dataset.vid = item.id;
            el.innerHTML = `
                <div class="${type}-thumb">
                    <img src="${escapeHtml(item.thumbnail)}" alt="" loading="lazy" decoding="async">
                    <span class="${type === "result" ? "duration" : "related-duration"}">${escapeHtml(item.durationLabel)}</span>
                </div>
                <div class="${type}-body">
                    <strong>${escapeHtml(item.title)}</strong>
                    <p>${escapeHtml(item.channelTitle)}</p>
                    ${type === "result" ? `<p>${escapeHtml(item.description)}</p>` : ""}
                </div>`;
            return el;
        }

        function renderResults(append = false) {
            const frag = document.createDocumentFragment();
            const slice = append 
                ? state.searchResults.slice(dom.results.children.length) 
                : state.searchResults;

            if (!append) dom.results.innerHTML = "";
            
            if (!slice.length && !append) {
                dom.results.innerHTML = '<div class="empty">Tidak ada hasil.</div>';
                dom.resultsCount.textContent = "0 hasil";
                updatePagination(); saveState(); return;
            }

            slice.forEach(item => {
                const card = createItem(item);
                card.addEventListener("click", () => {
                    loadVideo(item);
                    setTimeout(() => dom.playerWrap.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
                });
                frag.appendChild(card);
            });
            dom.results.appendChild(frag);
            dom.resultsCount.textContent = `${state.allResults.length} hasil`;
            updatePagination(); saveState();
        }

        function renderRelated(videos) {
            if (!videos?.length) { dom.relatedSection.style.display = "none"; return; }
            dom.relatedSection.style.display = "block";
            dom.relatedList.innerHTML = "";
            const frag = document.createDocumentFragment();
            videos.forEach(v => {
                const el = createItem(v, "related");
                el.addEventListener("click", () => {
                    loadVideo(v, { keep: true });
                    fetchRelated(v.id).then(renderRelated);
                    setTimeout(() => dom.playerWrap.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
                });
                frag.appendChild(el);
            });
            dom.relatedList.appendChild(frag);
        }

        function updatePagination() {
            const shown = Math.min(state.searchResults.length, state.allResults.length);
            const total = state.allResults.length;
            
            if (total <= CONFIG.ITEMS_PER_PAGE) {
                dom.loadMoreBtn.style.display = "none";
                dom.pageInfo.textContent = total ? `Menampilkan ${total} video` : ""; return;
            }

            dom.pageInfo.textContent = `Menampilkan ${shown} dari ${total} video`;
            const canLoad = state.searchResults.length >= CONFIG.MAX_INLINE_ITEMS && state.hasMore && !state.isLoading;
            dom.loadMoreBtn.style.display = canLoad ? "block" : "none";
            dom.loadMoreBtn.disabled = false;
            dom.loadMoreBtn.innerHTML = '<i class="fa-solid fa-plus"></i> Muat Lebih Banyak';
            
            if (!canLoad && state.searchResults.length < CONFIG.MAX_INLINE_ITEMS && state.hasMore) {
                dom.pageInfo.textContent += " • Scroll untuk muat lebih";
            } else if (!state.hasMore) {
                dom.pageInfo.textContent = `Semua ${total} video telah dimuat`;
            }
        }

        // === VIDEO CONTROL ===
        function loadVideo(item, opts = {}) {
            if (!state.player?.loadVideoById) { showToast("Player belum siap."); return; }
            state.selectedVideoId = item.id; state.transitioning = true;
            
            const start = opts.start || 0;
            if (opts.auto !== false) state.player.loadVideoById({ videoId: item.id, startSeconds: start });
            else state.player.cueVideoById({ videoId: item.id, startSeconds: start });
            
            state.player.mute(); state.player.setVolume(0);
            dom.playerWrap.classList.add("visible");
            dom.playerWrap.classList.toggle("minimized", !!opts.mini);
            dom.videoInfo.classList.add("visible");
            dom.videoInfo.classList.toggle("minimized", !!opts.mini);
            showOverlay(); dom.playerWrap.classList.remove("controls-hidden");
            
            dom.title.textContent = item.title;
            dom.meta.textContent = `${item.channelTitle} • ${item.description}`;
            
            renderResults();
            fetchRelated(item.id).then(renderRelated);
            scheduleHide(2000);
            if (!opts.silent) saveState();
        }

        function minimizeForSearch() {
            if (!state.selectedVideoId || !dom.playerWrap.classList.contains("visible")) return;
            if (state.isTheater) toggleTheater();
            if (state.isFullscreen) toggleFullscreen();
            dom.playerWrap.classList.add("minimized");
            dom.videoInfo.classList.add("minimized");
            showOverlay();
            setTimeout(() => dom.resultsCard.scrollIntoView({ behavior: "smooth", block: "start" }), 50);
            saveState();
        }

        function togglePlayback() {
            if (!state.player || !state.selectedVideoId) { showToast("Pilih video dulu."); return; }
            state.player.getPlayerState() === YT.PlayerState.PLAYING ? state.player.pauseVideo() : (state.player.playVideo(), state.player.mute(), state.player.setVolume(0));
            showOverlay(); scheduleHide();
        }

        // === THEATER & FULLSCREEN ===
        function toggleTheater() {
            state.isTheater = !state.isTheater;
            dom.mainPage.classList.toggle("theater-mode", state.isTheater);
            dom.playerWrap.classList.toggle("theater", state.isTheater);
            dom.theaterBtn.classList.toggle("active", state.isTheater);
            dom.theaterBtn.querySelector("i").className = state.isTheater ? "fa-solid fa-compress" : "fa-solid fa-expand";
            saveState();
            showToast(state.isTheater ? "Theater mode aktif" : "Theater mode nonaktif");
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) dom.playerWrap.requestFullscreen?.() || dom.playerWrap.webkitRequestFullscreen?.();
            else document.exitFullscreen?.() || document.webkitExitFullscreen?.();
        }

        function updateFullscreenUI() {
            state.isFullscreen = !!document.fullscreenElement;
            dom.fullscreenBtn.querySelector("i").className = state.isFullscreen ? "fa-solid fa-compress" : "fa-solid fa-up-right-and-down-left-from-center";
            dom.fullscreenBtn.classList.toggle("active", state.isFullscreen);
            document.documentElement.classList.toggle("fullscreen-active", state.isFullscreen);
            saveState();
        }

        // === AUDIO TRACKS ===
        function filterTracks(q) {
            const l = q.toLowerCase().trim();
            state.filteredTracks = l 
                ? audioTracks.filter(t => t.title.toLowerCase().includes(l) || t.reciter.toLowerCase().includes(l))
                : [...audioTracks];
            renderTracks();
        }

        function renderTracks() {
            const frag = document.createDocumentFragment();
            dom.trackList.innerHTML = "";
            
            if (!state.filteredTracks.length) {
                dom.trackList.innerHTML = '<div class="track-item no-results"><i class="fa-solid fa-circle-xmark"></i> Tidak ada hasil</div>';
                return;
            }
            
            state.filteredTracks.forEach(t => {
                const idx = audioTracks.findIndex(a => a.id === t.id);
                const btn = document.createElement("button");
                btn.type = "button";
                btn.className = `track-item${idx === state.trackIndex ? " active" : ""}`;
                btn.innerHTML = `<strong>${escapeHtml(t.title)}</strong><span>${escapeHtml(t.reciter)}</span>`;
                btn.addEventListener("click", () => selectTrack(idx, true));
                frag.appendChild(btn);
            });
            dom.trackList.appendChild(frag);
        }

        function selectTrack(idx, auto = true) {
            state.trackIndex = idx; state.currentRepeat = 0;
            dom.audio.src = audioTracks[idx].file; dom.audio.load();
            dom.trackInfo.textContent = audioTracks[idx].title;
            dom.status.textContent = audioTracks[idx].reciter;
            dom.toggleAudio.querySelector("i").className = "fa-solid fa-play";
            updateRepeatUI(); renderTracks(); saveState();
            if (auto) dom.audio.play().catch(() => {});
        }

        function updateRepeatUI() {
            dom.repeatCount.textContent = state.maxRepeat;
            const p = Math.min(state.currentRepeat + 1, state.maxRepeat);
            dom.repeatText.textContent = `Putaran ${p}/${state.maxRepeat}`;
            dom.repeatBar.style.width = `${(p / state.maxRepeat) * 100}%`;
        }

        function setRepeat(c) {
            state.maxRepeat = Math.max(1, Math.min(20, c));
            state.currentRepeat = 0; updateRepeatUI(); saveState();
            showToast(`Pengulangan diatur ${state.maxRepeat} kali`);
        }

        function playRandom() {
            if (audioTracks.length < 2) return selectTrack(state.trackIndex, true);
            let n = state.trackIndex;
            while (n === state.trackIndex) n = Math.floor(Math.random() * audioTracks.length);
            selectTrack(n, true);
            showToast(`Surat diacak ke ${audioTracks[n].title}`);
        }

        function toggleAudio() {
            if (!dom.audio.src) selectTrack(state.trackIndex, false);
            dom.audio.paused ? dom.audio.play().catch(() => {}) : dom.audio.pause();
        }

        // === RESTORE STATE ===
        function restoreState() {
            try {
                const raw = localStorage.getItem(CONFIG.STORAGE_KEY);
                if (!raw) {
                    state.searchResults = defaultSuggestions;
                    state.allResults = [...defaultSuggestions];
                    renderResults(); return;
                }
                const s = JSON.parse(raw);
                dom.searchInput.value = s.q || "";
                state.searchResults = Array.isArray(s.results) && s.results.length ? s.results : defaultSuggestions;
                state.allResults = [...state.searchResults];
                state.trackIndex = Number.isInteger(s.tid) ? Math.min(Math.max(s.tid, 0), audioTracks.length - 1) : 0;
                state.maxRepeat = Math.max(1, Number(s.maxR) || 3);
                state.currentRepeat = Math.max(0, Number(s.curR) || 0);
                dom.volume.value = String(Math.max(0, Math.min(100, Number(s.vol) || 72)));
                dom.audio.volume = dom.volume.value / 100;
                dom.volVal.textContent = `${dom.volume.value}%`;
                state.nextPageToken = s.npt || null;
                state.query = s.query || "";
                state.isTheater = !!s.theater; state.isFullscreen = !!s.fs;
                
                dom.mainPage.classList.toggle("theater-mode", state.isTheater);
                dom.playerWrap.classList.toggle("theater", state.isTheater);
                dom.theaterBtn.classList.toggle("active", state.isTheater);
                dom.theaterBtn.querySelector("i").className = state.isTheater ? "fa-solid fa-compress" : "fa-solid fa-expand";
                updateFullscreenUI();
                
                renderResults(); updatePagination();
                selectTrack(state.trackIndex, false); updateRepeatUI();
                if (s.vid) state.pendingRestore = s;
            } catch (e) {
                console.error(e);
                state.searchResults = defaultSuggestions;
                state.allResults = [...defaultSuggestions];
                renderResults(); selectTrack(state.trackIndex, false);
            }
        }

        function restoreVideoState(s) {
            if (!state.player || !s?.vid) return;
            const item = state.searchResults.find(i => i.id === s.vid);
            if (!item) return;
            loadVideo(item, { start: s.time || 0, auto: !!s.playing, mini: !!s.mini, silent: true, keep: true });
        }

        // === INTERSECTION OBSERVER (Infinite Scroll) ===
        function setupObserver() {
            const sentinel = document.createElement("div");
            sentinel.style.height = "1px"; sentinel.style.visibility = "hidden";
            dom.resultsCard.appendChild(sentinel);

            state.observer = new IntersectionObserver(([entry]) => {
                if (entry.isIntersecting && !state.isLoading && state.hasMore && state.searchResults.length < CONFIG.MAX_INLINE_ITEMS) {
                    loadMore();
                }
            }, { rootMargin: `${CONFIG.SCROLL_THRESHOLD}px` });
            state.observer.observe(sentinel);
        }

        // === EVENT LISTENERS ===
        function setupEvents() {
            dom.toggleVideo.addEventListener("click", togglePlayback);
            dom.shield.addEventListener("click", togglePlayback);
            dom.expandBtn.addEventListener("click", () => {
                dom.playerWrap.classList.remove("minimized");
                dom.videoInfo.classList.remove("minimized");
                saveState();
                setTimeout(() => dom.playerWrap.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50);
            });
            dom.progressBar.addEventListener("click", e => {
                if (!state.player?.getDuration) return;
                const r = dom.progressBar.getBoundingClientRect();
                state.player.seekTo(state.player.getDuration() * Math.max(0, Math.min(1, (e.clientX - r.left) / r.width)), true);
                showOverlay(); scheduleHide();
            });

            dom.toggleAudio.addEventListener("click", toggleAudio);
            dom.prev.addEventListener("click", () => selectTrack((state.trackIndex - 1 + audioTracks.length) % audioTracks.length, true));
            dom.next.addEventListener("click", () => selectTrack((state.trackIndex + 1) % audioTracks.length, true));
            dom.shuffle.addEventListener("click", playRandom);
            dom.syncBtn.addEventListener("click", () => {
                if (!state.selectedVideoId) return showToast("Pilih video dulu.");
                selectTrack(state.trackIndex, true); dom.audio.currentTime = 0;
            });
            dom.repeatDec.addEventListener("click", () => setRepeat(state.maxRepeat - 1));
            dom.repeatInc.addEventListener("click", () => setRepeat(state.maxRepeat + 1));
            dom.volume.addEventListener("input", () => {
                dom.audio.volume = dom.volume.value / 100;
                dom.volVal.textContent = `${dom.volume.value}%`;
                saveState();
            });

            dom.audio.addEventListener("play", () => { dom.status.textContent = "Diputar"; dom.toggleAudio.querySelector("i").className = "fa-solid fa-pause"; updateRepeatUI(); saveState(); });
            dom.audio.addEventListener("pause", () => { dom.status.textContent = "Dijeda"; dom.toggleAudio.querySelector("i").className = "fa-solid fa-play"; saveState(); });
            dom.audio.addEventListener("ended", () => {
                state.currentRepeat++;
                if (state.currentRepeat < state.maxRepeat) {
                    dom.audio.currentTime = 0; dom.audio.play().catch(() => {});
                    dom.status.textContent = "Mengulang"; updateRepeatUI(); saveState(); return;
                }
                dom.status.textContent = "Selesai"; dom.toggleAudio.querySelector("i").className = "fa-solid fa-play";
                state.currentRepeat = 0; updateRepeatUI(); saveState();
            });
            dom.audio.addEventListener("error", () => { dom.status.textContent = "Error"; showToast("Gagal memuat audio."); });

            dom.searchBtn.addEventListener("click", () => searchVideos());
            dom.searchInput.addEventListener("keydown", e => { if (e.key === "Enter") searchVideos(); });
            dom.chips.forEach(b => b.addEventListener("click", () => { dom.searchInput.value = b.dataset.query; searchVideos(); }));
            
            let searchTimer;
            dom.trackSearch.addEventListener("input", e => {
                clearTimeout(searchTimer);
                searchTimer = setTimeout(() => filterTracks(e.target.value), 200);
            });

            dom.theaterBtn.addEventListener("click", toggleTheater);
            dom.fullscreenBtn.addEventListener("click", toggleFullscreen);
            document.addEventListener("fullscreenchange", updateFullscreenUI);
            document.addEventListener("webkitfullscreenchange", updateFullscreenUI);

            document.addEventListener("keydown", e => {
                if (document.activeElement.matches("input, textarea")) return;
                const k = e.key.toLowerCase();
                if (k === "f" && dom.playerWrap.classList.contains("visible")) { e.preventDefault(); toggleFullscreen(); }
                if (k === "t" && dom.playerWrap.classList.contains("visible")) { e.preventDefault(); toggleTheater(); }
                if (k === " ") { e.preventDefault(); togglePlayback(); }
                if (k === "escape" && (state.isFullscreen || state.isTheater)) { if (state.isFullscreen) toggleFullscreen(); if (state.isTheater) toggleTheater(); }
            });

            dom.loadMoreBtn.addEventListener("click", () => { if (state.nextPageToken && !state.isLoading) loadMore(); });
            dom.refreshRelated.addEventListener("click", () => { if (state.selectedVideoId) { showToast("Memuat..."); fetchRelated(state.selectedVideoId).then(renderRelated); } });
            
            window.addEventListener("beforeunload", saveState);
        }

        // === INIT ===
        function init() {
            restoreState();
            setupEvents();
            setupObserver();
            if (!dom.trackList.children.length) {
                renderTracks();
                selectTrack(state.trackIndex, false);
                dom.audio.volume = dom.volume.value / 100;
                updateRepeatUI();
            }
        }

        document.readyState === "loading" ? document.addEventListener("DOMContentLoaded", init) : init();
    </script>
</body>
</html>
