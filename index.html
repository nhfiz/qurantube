<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Murottal Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --bg: #f8f7f3;
            --surface: #ffffff;
            --surface-soft: #f4f4f0;
            --line: #e8e6df;
            --text: #142018;
            --muted: #6d786e;
            --accent: #1d5d47;
            --accent-dark: #154434;
            --green: #116149;
            --green-soft: #e8f4ef;
            --radius: 16px;
            --shadow-soft: 0 8px 20px rgba(30, 36, 32, 0.06);
            --shadow-strong: 0 16px 28px rgba(30, 36, 32, 0.08);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        html.fullscreen-active body { overflow: hidden; }
        body { font-family: "Plus Jakarta Sans", sans-serif; background: var(--surface); color: var(--text); }
        button, input { font: inherit; }

        .topbar {
            position: sticky; top: 0; z-index: 20;
            background: rgba(255, 255, 255, 0.7); backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--line);
        }
        html.fullscreen-active .topbar { display: none; }
        .topbar-inner { max-width: 1380px; margin: 0 auto; padding: 12px 18px; display: grid; grid-template-columns: 220px minmax(0, 1fr); gap: 16px; align-items: center; }
        .brand { display: flex; align-items: center; gap: 10px; font-weight: 700; white-space: nowrap; }
        .brand i { color: var(--accent); font-size: 28px; }
        .searchbar { display: grid; grid-template-columns: minmax(0, 1fr) 56px; gap: 10px; align-items: center; }
        .search-input { width: 100%; border: 1px solid #d8d8d1; background: #fff; border-radius: 999px; padding: 12px 16px; color: var(--text); }
        .search-input:focus { outline: none; border-color: #8ab4f8; }
        .search-button { border: 1px solid #d8d8d1; background: var(--surface-soft); border-radius: 999px; cursor: pointer; height: 46px; }

        .page { max-width: 1380px; margin: 22px auto 40px; padding: 0 18px; display: grid; grid-template-columns: minmax(0, 1.55fr) 380px; gap: 24px; align-items: start; transition: grid-template-columns 0.3s ease; }
        .page.theater-mode { grid-template-columns: 1fr; max-width: 100%; padding: 0 24px; }
        .page.theater-mode .watch-column { grid-template-columns: 1fr; }
        .page.theater-mode .sidebar { position: static; width: 100%; max-width: 720px; margin: 0 auto; }
        .page.theater-mode .murottal-card { border-radius: 0 0 var(--radius) var(--radius); border-top: none; margin-top: -1px; }
        .watch-column { min-width: 0; display: grid; gap: 16px; }

        .quick-chips { display: flex; flex-wrap: wrap; gap: 10px; }
        .quick-chip { border: 1px solid var(--line); background: var(--surface); color: var(--text); border-radius: 999px; padding: 10px 14px; font-size: 13px; font-weight: 600; cursor: pointer; }

        .player-wrap {
            background: #000; border-radius: 18px; overflow: hidden; aspect-ratio: 16 / 9;
            display: none; box-shadow: var(--shadow-strong); position: relative;
            transition: border-radius 0.3s ease, box-shadow 0.3s ease, max-width 0.3s ease;
        }
        .player-wrap.visible { display: block; }
        .player-wrap.minimized {
            max-width: 340px; margin-left: auto; aspect-ratio: 16 / 9;
            box-shadow: 0 10px 24px rgba(0, 0, 0, 0.18);
            position: fixed; bottom: 30px; right: 30px; border-radius: 12px; z-index: 50;
        }
        .page.theater-mode .player-wrap.theater { border-radius: var(--radius) var(--radius) 0 0; box-shadow: none; margin: 0; width: 100%; max-width: 720px; margin-left: auto; margin-right: auto; }
        .player-wrap.controls-hidden .player-overlay { opacity: 0; }

        .player-wrap:fullscreen, .player-wrap:-webkit-full-screen, .player-wrap:-moz-full-screen, .player-wrap:-ms-fullscreen {
            width: 100vw; height: 100vh; border-radius: 0; margin: 0; display: block !important; position: fixed; top: 0; left: 0; z-index: 1000;
        }
        .player-wrap:fullscreen #youtube-player, .player-wrap:-webkit-full-screen #youtube-player, .player-wrap:-moz-full-screen #youtube-player, .player-wrap:-ms-fullscreen #youtube-player { width: 100%; height: 100%; }

        #youtube-player { width: 100%; height: 100%; }
        .player-shield { position: absolute; inset: 0; z-index: 1; background: transparent; }

        .player-overlay {
            position: absolute; inset: 0; z-index: 2;
            display: flex; flex-direction: column; justify-content: space-between;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.22), transparent 28%, transparent 62%, rgba(0, 0, 0, 0.68));
            pointer-events: none; transition: opacity 0.22s ease, visibility 0.22s ease;
        }
        .player-overlay.hidden { display: none; }
        .player-bottom { pointer-events: auto; padding: 16px; display: flex; align-items: center; gap: 12px; position: absolute; bottom: 0; width: 100%; flex-wrap: wrap; }
        .player-wrap.controls-hidden .player-bottom { pointer-events: none; }

        .player-progress { display: grid; gap: 8px; width: 100%; max-width: calc(100% - 200px); }
        .player-controls { display: flex; flex-wrap: wrap; gap: 10px; flex-shrink: 0; }
        .player-bottom i { color: var(--surface); }
        .player-control-button { border: none; border-radius: 999px; padding: 10px 14px; background: rgba(255, 255, 255, 0.16); color: #fff; cursor: pointer; font-weight: 700; backdrop-filter: blur(8px); display: flex; align-items: center; gap: 6px; font-size: 13px; }
        .player-control-button.primary { background: transparent; backdrop-filter: blur(20px); }
        .player-control-button:hover { background: rgba(255, 255, 255, 0.28); }

        .video-info { margin-top: 16px; display: none; gap: 12px; }
        .video-info.visible { display: grid; }
        .video-info.minimized { display: none; }
        .page.theater-mode .video-info.visible { max-width: 720px; margin: 16px auto 0; padding: 0 12px; }
        .video-title { font-size: clamp(20px, 2.3vw, 26px); line-height: 1.35; font-weight: 700; letter-spacing: -0.02em; }
        .video-meta { display: flex; flex-wrap: wrap; gap: 10px; color: var(--muted); font-size: 14px; }
        .meta-badge { display: inline-flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 999px; background: var(--surface-soft); color: var(--muted); font-weight: 600; }
        .meta-badge.audio { background: var(--green-soft); color: var(--green); }

        .murottal-card, .results-card, .related-card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow-soft); }
        .progress-bar { height: 8px; border-radius: 999px; overflow: hidden; margin-bottom: 8px; cursor: pointer; position: relative; }
        .progress-value { height: 100%; width: 0%; background: linear-gradient(315deg, #EF0F46, #EF889E); border-radius: 20px; position: relative; transition: width 0.1s linear; }
        .progress-value:after { content: ""; position: absolute; width: 1000px; background: #ffffff50; height: 8px; border-radius: 4px; right: -1004px; }
        .progress-text { color: #fff; font-size: 13px; text-wrap: nowrap; font-weight: 500; }

        .card-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
        .card-head h3 { font-size: 16px; }
        .card-head span { color: var(--muted); font-size: 13px; }
        .murottal-player { display: grid; gap: 14px; }
        .murottal-top { display: grid; grid-template-columns: 54px minmax(0, 1fr); gap: 12px; align-items: center; }
        .murottal-cover { width: 54px; height: 54px; border-radius: 999px; background: linear-gradient(135deg, #1a5f49, #b78a2e); color: #fff; display: grid; place-items: center; box-shadow: 0 12px 24px rgba(26, 95, 73, 0.18); font-size: 20px; }
        .murottal-now { min-width: 0; }
        .murottal-now strong { display: block; font-size: 14px; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .murottal-now span { color: var(--muted); font-size: 12px; }
        .murottal-buttons { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; align-items: center; }
        .icon-button, .tool-button { width: 100%; height: 44px; border-radius: 14px; border: none; cursor: pointer; color: var(--text); background: transparent; transition: background 0.2s ease; }
        .icon-button:hover, .tool-button:hover { background: var(--surface-soft); }
        .icon-button.primary-icon { background: linear-gradient(180deg, var(--accent), var(--accent-dark)); color: var(--surface); width: 50px; height: 50px; border-radius: 40px; display: grid; place-items: center; margin: 0 auto; box-shadow: var(--accent) 0px 10px 20px -10px; transition: transform 0.2s ease, box-shadow 0.2s ease; }
        .icon-button.primary-icon:hover { transform: scale(1.05); box-shadow: var(--accent) 0px 14px 28px -10px; }
        .icon-button.primary-icon:active { transform: scale(0.98); }
        .murottal-search { margin: 20px 0; position: relative; }
        .murottal-search input { width: 100%; border: 1px solid var(--line); background: var(--surface-soft); border-radius: 12px; padding: 10px 14px 10px 36px; color: var(--text); font-size: 13px; transition: border-color 0.2s ease; }
        .murottal-search input:focus { outline: none; border-color: var(--accent); }
        .murottal-search i { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--muted); font-size: 12px; }
        .track-list { display: grid; gap: 10px; margin: 12px 0 0; max-height: 340px; overflow-y: auto; padding-right: 4px; }
        .track-list::-webkit-scrollbar { width: 6px; }
        .track-list::-webkit-scrollbar-thumb { background: var(--line); border-radius: 3px; }
        .track-list::-webkit-scrollbar-track { background: transparent; }
        .track-item { width: 100%; text-align: left; border: 1px solid var(--line); background: #fff; border-radius: 14px; padding: 12px 14px; cursor: pointer; transition: border-color 0.18s ease, box-shadow 0.18s ease, transform 0.1s ease; }
        .track-item:hover { transform: translateX(2px); border-color: var(--accent); }
        .track-item.active { border-color: #98c8b8; background: var(--green-soft); box-shadow: 0 10px 24px rgba(17, 97, 73, 0.12); }
        .track-item strong { display: block; font-size: 14px; margin-bottom: 3px; }
        .track-item span { font-size: 12px; color: var(--muted); }
        .track-item.no-results { text-align: center; padding: 20px; color: var(--muted); cursor: default; }

        .volume-wrap { display: grid; gap: 6px; }
        .repeat-controls { display: flex; align-items: center; gap: 10px; background: var(--surface-soft); border-radius: 12px; padding: 8px; border: 1px solid var(--line); }
        .repeat-btn { width: 32px; height: 32px; border-radius: 8px; border: none; background: #fff; color: var(--text); cursor: pointer; display: grid; place-items: center; font-weight: 600; transition: background 0.2s ease, transform 0.1s ease; }
        .repeat-btn:hover { background: var(--green-soft); color: var(--green); }
        .repeat-btn:active { transform: scale(0.95); }
        .repeat-display { flex: 1; text-align: center; font-weight: 700; color: var(--accent); font-size: 15px; display: flex; align-items: center; justify-content: center; gap: 4px; }
        .repeat-display i { color: var(--green); font-size: 13px; }
        .repeat-status { color: var(--muted); font-size: 12px; margin-top: 6px; line-height: 1.5; display: flex; align-items: center; gap: 6px; }
        .repeat-progress { flex: 1; height: 4px; background: var(--line); border-radius: 2px; overflow: hidden; }
        .repeat-progress-bar { height: 100%; background: linear-gradient(90deg, var(--green), var(--accent)); border-radius: 2px; transition: width 0.3s ease; }
        .volume-wrap label { font-size: 12px; color: var(--muted); display: flex; align-items: center; gap: 8px; }
        .volume-slider { display: flex; align-items: center; gap: 10px; }
        input[type="range"] { width: 100%; accent-color: var(--green); cursor: pointer; }

        .sidebar { min-width: 0; display: grid; gap: 16px; position: sticky; top: 84px; align-self: start; transition: opacity 0.3s ease; }
        .results { display: grid; gap: 12px; }
        .result-item { display: grid; grid-template-columns: 168px minmax(0, 1fr); gap: 10px; background: #fff; border-radius: 14px; cursor: pointer; padding: 8px; border: 1px solid transparent; transition: border-color 0.18s ease, box-shadow 0.18s ease; }
        .result-item.active .result-thumb, .result-item:hover .result-thumb { outline: 2px solid var(--accent); }
        .result-item:hover, .result-item.active { border-color: var(--line); box-shadow: var(--shadow-soft); }
        .result-thumb { position: relative; aspect-ratio: 16 / 9; border-radius: 12px; overflow: hidden; background: #000; outline: 2px solid transparent; transition: outline-color 0.2s ease; }
        .result-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .duration { position: absolute; right: 8px; bottom: 8px; background: rgba(0, 0, 0, 0.8); color: #fff; border-radius: 6px; padding: 3px 6px; font-size: 11px; font-weight: 700; }
        .result-body { min-width: 0; padding: 2px 0; }
        .result-body strong { display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2; overflow: hidden; font-size: 15px; line-height: 1.4; margin-bottom: 6px; }
        .result-body p { color: var(--muted); font-size: 12px; line-height: 1.5; display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2; overflow: hidden; }
        .empty { padding: 14px; border-radius: 14px; background: var(--surface-soft); color: var(--muted); font-size: 14px; }

        .loading-more { text-align: center; padding: 16px; color: var(--muted); display: none; }
        .loading-more.active { display: block; }
        .loading-more i { animation: spin 1s linear infinite; margin-right: 8px; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .load-more-btn { width: 100%; padding: 12px; margin-top: 10px; border: 1px solid var(--line); background: var(--surface-soft); border-radius: 12px; color: var(--text); font-weight: 600; cursor: pointer; transition: background 0.2s ease; }
        .load-more-btn:hover { background: var(--green-soft); border-color: var(--accent); }
        .load-more-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .pagination-info { text-align: center; color: var(--muted); font-size: 12px; margin-top: 6px; min-height: 18px; }

        .related-list { display: grid; gap: 10px; }
        .related-item { display: grid; grid-template-columns: 120px minmax(0, 1fr); gap: 10px; background: #fff; border-radius: 12px; cursor: pointer; padding: 6px; border: 1px solid transparent; transition: border-color 0.18s ease, box-shadow 0.18s ease; }
        .related-item:hover, .related-item.active { border-color: var(--line); box-shadow: var(--shadow-soft); }
        .related-item.active .related-thumb { outline: 2px solid var(--accent); }
        .related-thumb { position: relative; aspect-ratio: 16 / 9; border-radius: 10px; overflow: hidden; background: #000; outline: 2px solid transparent; transition: outline-color 0.2s ease; }
        .related-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .related-body strong { display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2; overflow: hidden; font-size: 14px; line-height: 1.3; margin-bottom: 4px; }
        .related-body p { color: var(--muted); font-size: 11px; }
        .related-duration { position: absolute; right: 6px; bottom: 6px; background: rgba(0, 0, 0, 0.8); color: #fff; border-radius: 4px; padding: 2px 5px; font-size: 10px; font-weight: 600; }

        .toast { position: fixed; left: 50%; bottom: 20px; transform: translateX(-50%) translateY(10px); background: rgba(15, 15, 15, 0.95); color: #fff; padding: 12px 16px; border-radius: 999px; font-size: 13px; opacity: 0; pointer-events: none; transition: opacity 0.2s ease, transform 0.2s ease; z-index: 100; }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        .theater-btn.active i::before { content: "\f066"; }
        .fullscreen-btn.active i::before { content: "\f066"; }

        /* ✅ PURE CSS HOVER CONTROLS */
        .player-wrap:hover .player-overlay { opacity: 1 !important; visibility: visible !important; }
        .player-wrap:hover .player-bottom { pointer-events: auto !important; }
        .player-wrap.controls-hidden .player-overlay { opacity: 0; visibility: hidden; }
        .player-wrap:hover.controls-hidden .player-overlay { opacity: 1 !important; visibility: visible !important; }

        /* ✅ TOMBOL EXPAND & OVERLAY MINIMIZED */
        .player-expand-btn {
            position: absolute;
            top: 0;
            right: 0;
            z-index: 6;
            width: 100%;
            height: 100%;
            border-radius: 10px;
            border: none;
            background: #ffffff00;
            color: #fff;
            cursor: pointer;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            transition: background 0.2s;
            opacity: 0;
        }
        .player-wrap.minimized .player-expand-btn { display: flex; }
        .player-expand-btn:hover { background: rgba(0,0,0,0.5); opacity: 1;}

        /* 🛡️ Overlay tetap aktif saat minimized untuk blokir iframe YouTube */
        .player-wrap.minimized .player-shield { pointer-events: auto !important; z-index: 3; }
        .player-wrap.minimized .player-overlay { 
            opacity: 1 !important; visibility: visible !important; pointer-events: auto !important; 
        }
        .player-wrap.minimized .player-overlay.hidden { display: flex !important; opacity: 1 !important; }
        .player-wrap.minimized .player-bottom { 
            opacity: 0; pointer-events: none !important; 
            transition: opacity 0.2s ease;
        }
        /* Shield tetap transparan tapi menangkap klik */
        .player-wrap.minimized .player-shield { background: transparent; }

        @media (max-width: 1100px) { .page { grid-template-columns: 1fr; } }
        @media (max-width: 760px) {
            .topbar-inner { grid-template-columns: 1fr; }
            .searchbar, .result-item { grid-template-columns: 1fr; }
            .page { padding: 0 12px; margin-top: 14px; }
            .sidebar { position: static; }
            .player-bottom { padding: 12px; gap: 8px; }
            .player-control-button { padding: 8px 12px; font-size: 12px; }
            .player-progress { max-width: calc(100% - 140px); }
            .murottal-buttons { grid-template-columns: repeat(5, 1fr); gap: 6px; }
            .icon-button, .tool-button { height: 40px; }
            .icon-button.primary-icon { width: 44px; height: 44px; }
            .page.theater-mode .player-wrap.theater { max-width: 100%; margin: 0; }
            .page.theater-mode .video-info.visible,
            .page.theater-mode .sidebar { max-width: 100%; padding: 0 4px; }
            .related-item { grid-template-columns: 100px minmax(0, 1fr); }
            .player-expand-btn { width: 30px; height: 30px; top: 8px; right: 8px; font-size: 12px; }
        }
    </style>
</head>
<body>
    <header class="topbar">
        <div class="topbar-inner">
            <div class="brand"><i class="fa-brands fa-youtube"></i><span>YouTube Murottal</span></div>
            <div class="searchbar">
                <input id="search-query" class="search-input" type="text" placeholder="Telusuri video visual untuk diputar tanpa suara">
                <button id="search-button" class="search-button" type="button" aria-label="Cari"><i class="fa-solid fa-magnifying-glass"></i></button>
            </div>
        </div>
    </header>

    <main class="page" id="main-page">
        <section class="watch-column">
            <div class="player-wrap" id="player-wrap">
                <div id="youtube-player"></div>
                <div id="player-shield" class="player-shield" aria-hidden="true"></div>
                <button id="player-expand-btn" class="player-expand-btn" type="button" title="Perbesar player"><i class="fa-solid fa-up-right-and-down-left-from-center"></i></button>
                <div id="player-overlay" class="player-overlay">
                    <div class="player-bottom">
                        <div class="player-controls">
                            <button id="toggle-video" class="player-control-button primary" type="button" aria-label="Play pause video"><i class="fa-solid fa-play"></i></button>
                        </div>
                        <div class="player-progress">
                            <div class="progress-bar" id="progress-bar"><div id="progress-value" class="progress-value"></div></div>
                        </div>
                        <div id="time-display" class="progress-text">00:00 / 00:00</div>
                        <button id="theater-btn" class="player-control-button theater-btn" type="button" aria-label="Theater mode" title="Theater Mode"><i class="fa-solid fa-expand"></i></button>
                        <button id="fullscreen-btn" class="player-control-button fullscreen-btn" type="button" aria-label="Fullscreen" title="Fullscreen"><i class="fa-solid fa-up-right-and-down-left-from-center"></i></button>
                    </div>
                </div>
            </div>

            <div class="video-info">
                <h1 id="current-title" class="video-title">Belum ada video dipilih</h1>
                <div class="video-meta"><div id="current-meta" class="meta-badge">Pilih salah satu video dari daftar di bawah</div></div>
            </div>

            <div class="results-card">
                <div class="card-head">
                    <h3>Daftar Video</h3><span id="results-count">0 hasil</span>
                </div>
                <div class="quick-chips" style="margin-bottom:14px;">
                    <button class="quick-chip" type="button" data-query="nussa rarra">Nussa Rarra</button>
                    <button class="quick-chip" type="button" data-query="cerita ubay">Cerita Ubay</button>
                    <button class="quick-chip" type="button" data-query="sarah playschool">Sarah Playschool</button>
                    <button class="quick-chip" type="button" data-query="kartun islami anak">Kartun Islami</button>
                </div>
                <div id="results" class="results"><div class="empty">Cari video dari kolom pencarian di atas.</div></div>
                <div id="loading-more" class="loading-more"><i class="fa-solid fa-spinner"></i></div>
                <button id="load-more-btn" class="load-more-btn" style="display:none;"><i class="fa-solid fa-plus"></i> Muat Lebih Banyak</button>
                <div id="pagination-info" class="pagination-info"></div>
            </div>

            <div class="related-card" id="related-section" style="display:none;">
                <div class="card-head">
                    <h3><i class="fa-solid fa-link" style="color:var(--accent);margin-right:6px;"></i>Video Terkait</h3>
                    <button id="refresh-related" class="tool-button" style="width:auto;padding:6px 12px;font-size:12px;" title="Refresh rekomendasi"><i class="fa-solid fa-rotate"></i></button>
                </div>
                <div id="related-list" class="related-list"></div>
            </div>
        </section>

        <aside class="sidebar">
            <div class="murottal-card">
                <div class="card-head"><h3>Murottal</h3><span><i class="fa-solid fa-headphones-simple"></i></span></div>
                <div class="murottal-player">
                    <div class="murottal-top">
                        <div class="murottal-cover"><i class="fa-solid fa-music"></i></div>
                        <div class="murottal-now"><strong id="selected-track-info">Belum ada track dipilih.</strong><span id="audio-mini-status">Siap diputar</span></div>
                    </div>

        function onYouTubeIframeAPIReady() {
            player = new YT.Player("youtube-player", {
                host: "https://www.youtube-nocookie.com", videoId: "",
                playerVars: { autoplay: 0, controls: 0, fs: 0, disablekb: 1, iv_load_policy: 3, rel: 0, modestbranding: 1, playsinline: 1 },
                events: { onReady: handlePlayerReady, onStateChange: handlePlayerStateChange }
            });
        }

        function handlePlayerReady() {
            player.mute(); player.setVolume(0); updateTimeDisplay();
            if (pendingRestoreState) { restoreVideoState(pendingRestoreState); pendingRestoreState = null; }
        }

        function handlePlayerStateChange(event) {
            if (!player) return;
            player.mute(); player.setVolume(0);
            if (event.data === YT.PlayerState.PLAYING) {
                isVideoTransitioning = false;
                startAudioWithVideo(); startProgressLoop(); schedulePlayerControlsHide();
            } else if (event.data === YT.PlayerState.PAUSED) {
                stopProgressLoop(); setPlayerControlsVisible(true);
                if (!isVideoTransitioning) pauseAudioWithVideo();
            } else if (event.data === YT.PlayerState.ENDED) {
                stopProgressLoop(); setPlayerControlsVisible(true);
                if (searchResults.length > 0 && selectedVideoId) {
                    const idx = searchResults.findIndex(item => item.id === selectedVideoId);
                    if (idx >= 0 && idx < searchResults.length - 1) {
                        const next = searchResults[idx + 1];
                        loadVideo(next, { autoplay: true, preserveAudio: true });
                        showToast(`Berikutnya: ${next.title}`);
                    } else { pauseAudioWithVideo(); }
                } else { pauseAudioWithVideo(); }
            }
            saveAppState();
        }

        function startAudioWithVideo() {
            if (!audioElement.src) selectTrack(selectedTrackIndex, false);
            if (audioElement.paused) audioElement.play().catch(() => {});
        }
        function pauseAudioWithVideo() { if (!audioElement.paused) audioElement.pause(); }
        function startProgressLoop() { stopProgressLoop(); const tick = () => { updateTimeDisplay(); progressFrame = requestAnimationFrame(tick); }; tick(); }
        function stopProgressLoop() { if (progressFrame) { cancelAnimationFrame(progressFrame); progressFrame = null; } updateTimeDisplay(); }
        function updateTimeDisplay() {
            if (!player?.getCurrentTime) { timeDisplay.textContent = "00:00 / 00:00"; progressValue.style.width = "0%"; return; }
            const cur = player.getCurrentTime() || 0, dur = player.getDuration() || 0;
            timeDisplay.textContent = `${fmt(cur)} / ${fmt(dur)}`;
            progressValue.style.width = dur ? `${(cur / dur) * 100}%` : "0%";
        }
        function fmt(s) { const m = Math.floor(s / 60), sec = Math.floor(s % 60); return `${String(m).padStart(2, "0")}:${String(sec).padStart(2, "0")}`; }

        function showToast(msg) { toast.textContent = msg; toast.classList.add("show"); clearTimeout(showToast.timer); showToast.timer = setTimeout(() => toast.classList.remove("show"), 2400); }
        function escapeHtml(t) { const m = { "&": "&amp;", "<": "&lt;", ">": "&gt;", "\"": "&quot;", "'": "&#039;" }; return String(t).replace(/[&<>"']/g, c => m[c]); }

        function setPlayerControlsVisible(v) { if (!playerWrap.classList.contains("visible")) return; playerWrap.classList.toggle("controls-hidden", !v); }
        function schedulePlayerControlsHide(d = 1200) { clearTimeout(overlayHideTimer); overlayHideTimer = setTimeout(() => setPlayerControlsVisible(false), d); }

        function saveAppState() {
            try {
                localStorage.setItem(STORAGE_KEY, JSON.stringify({
                    searchQuery: searchQueryInput.value.trim(), searchResults: searchResults.slice(0, ITEMS_PER_PAGE),
                    selectedVideoId, selectedTrackIndex, maxRepeat, currentRepeat,
                    volumeValue: Number(audioVolume.value), playerVisible: playerWrap.classList.contains("visible"),
                    playerMinimized: playerWrap.classList.contains("minimized"),
                    currentVideoTime: player?.getCurrentTime?.() || 0, wasVideoPlaying: player?.getPlayerState?.() === YT.PlayerState.PLAYING,
                    isTheaterMode, isFullscreen, currentPage, nextPageToken, currentSearchQuery
                }));
            } catch (e) { console.error(e); }
        }

        function restoreSavedState() {
            try {
                const raw = localStorage.getItem(STORAGE_KEY);
                if (!raw) { searchResults = defaultSuggestions; allSearchResults = [...defaultSuggestions]; renderResults(); return; }
                const s = JSON.parse(raw);
                searchQueryInput.value = s.searchQuery || "";
                searchResults = Array.isArray(s.searchResults) && s.searchResults.length ? s.searchResults : defaultSuggestions;
                allSearchResults = [...searchResults];
                selectedTrackIndex = Number.isInteger(s.selectedTrackIndex) ? Math.min(Math.max(s.selectedTrackIndex, 0), audioTracks.length - 1) : 0;
                maxRepeat = Math.max(1, Number(s.maxRepeat) || 3); currentRepeat = Math.max(0, Number(s.currentRepeat) || 0);
                audioVolume.value = String(Math.max(0, Math.min(100, Number(s.volumeValue) || 72)));
                audioElement.volume = audioVolume.value / 100; volumeValue.textContent = `${audioVolume.value}%`;
                currentPage = s.currentPage || 1; nextPageToken = s.nextPageToken || null; currentSearchQuery = s.currentSearchQuery || "";
                isTheaterMode = !!s.isTheaterMode; isFullscreen = !!s.isFullscreen;
                updateTheaterModeUI(); updateFullscreenButtonUI(); renderResults(); updatePaginationUI();
                selectTrack(selectedTrackIndex, false); updateRepeatUI();
                if (s.selectedVideoId) pendingRestoreState = s;
            } catch (e) { console.error(e); searchResults = defaultSuggestions; allSearchResults = [...defaultSuggestions]; renderResults(); selectTrack(selectedTrackIndex, false); }
        }

        function restoreVideoState(s) {
            if (!player || !s?.selectedVideoId) return;
            const item = searchResults.find(i => i.id === s.selectedVideoId);
            if (!item) return;
            loadVideo(item, { startTime: s.currentVideoTime || 0, autoplay: !!s.wasVideoPlaying, minimized: !!s.playerMinimized, silentSave: true, preserveAudio: true });
        }

        function iso8601ToClock(d) {
            const m = d.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/); if (!m) return "--:--";
            const h = +m[1]||0, min = +m[2]||0, sec = +m[3]||0;
            return h ? `${String(h).padStart(2, "0")}:${String(min).padStart(2, "0")}:${String(sec).padStart(2, "0")}` : `${String(min).padStart(2, "0")}:${String(sec).padStart(2, "0")}`;
        }

        function filterTracks(q) {
            const l = q.toLowerCase().trim();
            filteredTracks = l ? audioTracks.filter(t => t.title.toLowerCase().includes(l) || t.reciter.toLowerCase().includes(l)) : [...audioTracks];
            renderTrackList();
        }
        function renderTrackList() {
            trackList.innerHTML = "";
            if (!filteredTracks.length) { trackList.innerHTML = `<div class="track-item no-results"><i class="fa-solid fa-circle-xmark"></i> Tidak ada hasil</div>`; return; }
            filteredTracks.forEach(t => {
                const idx = audioTracks.findIndex(a => a.id === t.id);
                const btn = document.createElement("button"); btn.type = "button"; btn.className = `track-item${idx === selectedTrackIndex ? " active" : ""}`;
                btn.innerHTML = `<strong>${escapeHtml(t.title)}</strong><span>${escapeHtml(t.reciter)}</span>`;
                btn.addEventListener("click", () => selectTrack(idx, true)); trackList.appendChild(btn);
            });
        }
        function selectTrack(idx, auto = true) {
            selectedTrackIndex = idx; currentRepeat = 0;
            audioElement.src = audioTracks[idx].file; audioElement.load();
            selectedTrackInfo.textContent = audioTracks[idx].title; audioMiniStatus.textContent = audioTracks[idx].reciter;
            toggleAudioButton.innerHTML = '<i class="fa-solid fa-play"></i>'; updateRepeatUI(); renderTrackList(); saveAppState();
            if (auto) audioElement.play().catch(() => {});
        }
        function updateRepeatUI() { repeatCountDisplay.textContent = maxRepeat; const p = Math.min(currentRepeat + 1, maxRepeat); repeatText.textContent = `Putaran ${p}/${maxRepeat}`; repeatProgressBar.style.width = `${(p / maxRepeat) * 100}%`; }
        function setRepeatCount(c) { maxRepeat = Math.max(1, Math.min(20, c)); currentRepeat = 0; updateRepeatUI(); saveAppState(); showToast(`Pengulangan diatur ${maxRepeat} kali`); }
        function playRandomTrack() { if (audioTracks.length < 2) return selectTrack(selectedTrackIndex, true); let n = selectedTrackIndex; while (n === selectedTrackIndex) n = Math.floor(Math.random() * audioTracks.length); selectTrack(n, true); showToast(`Surat diacak ke ${audioTracks[n].title}`); }
        function toggleAudioPlayback() { if (!audioElement.src) selectTrack(selectedTrackIndex, false); audioElement.paused ? audioElement.play().catch(() => {}) : audioElement.pause(); }
        function syncSelectedAudio() { if (!selectedVideoId) return showToast("Pilih video terlebih dahulu."); selectTrack(selectedTrackIndex, true); audioElement.currentTime = 0; }

        function renderResults(append = false) {
            if (!append) resultsContainer.innerHTML = "";
            if (!searchResults.length && !append) { resultsContainer.innerHTML = '<div class="empty">Tidak ada hasil untuk kata kunci ini.</div>'; resultsCount.textContent = "0 hasil"; updatePaginationUI(); saveAppState(); return; }
            const start = append ? resultsContainer.children.length : 0;
            searchResults.slice(start).forEach(item => {
                const card = document.createElement("article"); card.className = `result-item${item.id === selectedVideoId ? " active" : ""}`; card.dataset.videoId = item.id;
                card.innerHTML = `<div class="result-thumb"><img src="${escapeHtml(item.thumbnail)}" alt="${escapeHtml(item.title)}" loading="lazy"><div class="duration">${escapeHtml(item.durationLabel)}</div></div><div class="result-body"><strong>${escapeHtml(item.title)}</strong><p>${escapeHtml(item.channelTitle)}</p><p>${escapeHtml(item.description)}</p></div>`;
                card.addEventListener("click", () => { loadVideo(item); requestAnimationFrame(() => playerWrap.scrollIntoView({ behavior: 'smooth', block: 'start' })); });
                resultsContainer.appendChild(card);
            });
            resultsCount.textContent = `${allSearchResults.length} hasil`; updatePaginationUI(); saveAppState();
        }

        function updatePaginationUI() {
            const shown = Math.min(searchResults.length, allSearchResults.length), total = allSearchResults.length;
            if (total <= ITEMS_PER_PAGE) { loadMoreBtn.style.display = "none"; paginationInfo.textContent = total ? `Menampilkan ${total} video` : ""; return; }
            paginationInfo.textContent = `Menampilkan ${shown} dari ${total} video`;
            if (searchResults.length >= MAX_INLINE_ITEMS && hasMoreResults && !isLoadingMore) { loadMoreBtn.style.display = "block"; loadMoreBtn.disabled = false; loadMoreBtn.innerHTML = '<i class="fa-solid fa-plus"></i> Muat Lebih Banyak'; }
            else { loadMoreBtn.style.display = "none"; if (searchResults.length < MAX_INLINE_ITEMS && hasMoreResults) paginationInfo.textContent += ` • Scroll untuk muat lebih`; else if (!hasMoreResults) paginationInfo.textContent = `Semua ${total} video telah dimuat`; }
        }

        async function loadMoreResults() {
            if (isLoadingMore || !hasMoreResults || !nextPageToken) return;
            isLoadingMore = true; loadingMore.classList.add("active"); updatePaginationUI();
            try {
                const url = new URL("https://www.googleapis.com/youtube/v3/search");
                url.searchParams.set("part", "snippet"); url.searchParams.set("type", "video"); url.searchParams.set("maxResults", String(ITEMS_PER_SCROLL));
                url.searchParams.set("q", currentSearchQuery); url.searchParams.set("key", YOUTUBE_API_KEY); url.searchParams.set("pageToken", nextPageToken);
                const res = await fetch(url); const data = await res.json();
                if (!res.ok) throw new Error(data.error?.message || "Gagal");
                const ids = (data.items || []).map(i => i.id?.videoId).filter(Boolean); if (!ids.length) { hasMoreResults = false; return; }
                const dUrl = new URL("https://www.googleapis.com/youtube/v3/videos");
                dUrl.searchParams.set("part", "contentDetails"); dUrl.searchParams.set("id", ids.join(",")); dUrl.searchParams.set("key", YOUTUBE_API_KEY);
                const dRes = await fetch(dUrl); const dData = await dRes.json();
                const dm = new Map((dData.items || []).map(i => [i.id, i.contentDetails?.duration || ""]));
                const newItems = (data.items || []).map(i => ({ id: i.id.videoId, title: i.snippet.title, channelTitle: i.snippet.channelTitle, description: (i.snippet.description || "").slice(0, 120), thumbnail: i.snippet.thumbnails.medium?.url || "", durationLabel: iso8601ToClock(dm.get(i.id.videoId) || "") }));
                allSearchResults.push(...newItems); searchResults.push(...newItems); nextPageToken = data.nextPageToken || null; hasMoreResults = !!nextPageToken;
                renderResults(true); showToast(`memuat ${newItems.length} video lainnya`);
            } catch (err) { showToast(`Gagal memuat: ${err.message}`); }
            finally { isLoadingMore = false; loadingMore.classList.remove("active"); updatePaginationUI(); }
        }

        async function fetchRelatedVideos(vid) {
            if (!vid) return []; try {
                const url = new URL("https://www.googleapis.com/youtube/v3/search");
                url.searchParams.set("part", "snippet"); url.searchParams.set("type", "video"); url.searchParams.set("maxResults", "8");
                url.searchParams.set("relatedToVideoId", vid); url.searchParams.set("key", YOUTUBE_API_KEY); url.searchParams.set("relevanceLanguage", "id");
                const res = await fetch(url); const data = await res.json(); if (!res.ok) throw new Error(data.error?.message);
                const ids = (data.items || []).map(i => i.id?.videoId).filter(Boolean); if (!ids.length) return [];
                const dUrl = new URL("https://www.googleapis.com/youtube/v3/videos"); dUrl.searchParams.set("part", "contentDetails"); dUrl.searchParams.set("id", ids.join(",")); dUrl.searchParams.set("key", YOUTUBE_API_KEY);
                const dRes = await fetch(dUrl); const dData = await dRes.json(); const dm = new Map((dData.items || []).map(i => [i.id, i.contentDetails?.duration || ""]));
                return (data.items || []).map(i => ({ id: i.id.videoId, title: i.snippet.title, channelTitle: i.snippet.channelTitle, thumbnail: i.snippet.thumbnails.medium?.url || "", durationLabel: iso8601ToClock(dm.get(i.id.videoId) || "") }));
            } catch (e) { console.error(e); return []; }
        }

        function renderRelatedVideos(videos) {
            if (!videos.length) { relatedSection.style.display = "none"; return; }
            relatedSection.style.display = "block"; relatedList.innerHTML = "";
            videos.forEach(v => {
                const el = document.createElement("div"); el.className = `related-item${v.id === selectedVideoId ? " active" : ""}`;
                el.innerHTML = `<div class="related-thumb"><img src="${escapeHtml(v.thumbnail)}" alt="${escapeHtml(v.title)}" loading="lazy"><span class="related-duration">${escapeHtml(v.durationLabel)}</span></div><div class="related-body"><strong>${escapeHtml(v.title)}</strong><p>${escapeHtml(v.channelTitle)}</p></div>`;
                el.addEventListener("click", () => { loadVideo(v, { preserveAudio: true }); fetchRelatedVideos(v.id).then(renderRelatedVideos); requestAnimationFrame(() => playerWrap.scrollIntoView({ behavior: 'smooth', block: 'start' })); });
                relatedList.appendChild(el);
            });
        }

        async function searchVideos(append = false) {
            const q = searchQueryInput.value.trim(); if (!q) { showToast("Masukkan kata kunci pencarian."); searchQueryInput.focus(); return; }
            if (!append) { minimizePlayerForSearch(); searchButton.disabled = true; resultsContainer.innerHTML = '<div class="empty">Mengambil data dari YouTube...</div>'; loadingMore.classList.remove("active"); allSearchResults = []; searchResults = []; currentPage = 1; nextPageToken = null; currentSearchQuery = q; hasMoreResults = true; }
            isLoadingMore = append; updatePaginationUI();
            try {
                const url = new URL("https://www.googleapis.com/youtube/v3/search");
                url.searchParams.set("part", "snippet"); url.searchParams.set("type", "video");
                url.searchParams.set("maxResults", String(append ? ITEMS_PER_SCROLL : ITEMS_PER_PAGE));
                url.searchParams.set("q", q); url.searchParams.set("key", YOUTUBE_API_KEY); if (nextPageToken) url.searchParams.set("pageToken", nextPageToken);
                const res = await fetch(url); const data = await res.json(); if (!res.ok) throw new Error(data.error?.message || "Gagal");
                const ids = (data.items || []).map(i => i.id?.videoId).filter(Boolean); if (!ids.length) throw new Error("Tidak ada video ditemukan.");
                const dUrl = new URL("https://www.googleapis.com/youtube/v3/videos"); dUrl.searchParams.set("part", "contentDetails"); dUrl.searchParams.set("id", ids.join(",")); dUrl.searchParams.set("key", YOUTUBE_API_KEY);
                const dRes = await fetch(dUrl); const dData = await dRes.json(); const dm = new Map((dData.items || []).map(i => [i.id, i.contentDetails?.duration || ""]));
                const newItems = (data.items || []).map(i => ({ id: i.id.videoId, title: i.snippet.title, channelTitle: i.snippet.channelTitle, description: (i.snippet.description || "").slice(0, 120), thumbnail: i.snippet.thumbnails.medium?.url || "", durationLabel: iso8601ToClock(dm.get(i.id.videoId) || "") }));
                if (append) { allSearchResults.push(...newItems); searchResults.push(...newItems); } else { allSearchResults = [...newItems]; searchResults = [...newItems]; }
                nextPageToken = data.nextPageToken || null; hasMoreResults = !!nextPageToken; renderResults(append);
                if (!append && searchResults.length > 0) { const t = selectedVideoId ? searchResults.find(v => v.id === selectedVideoId) : searchResults[0]; if (t) fetchRelatedVideos(t.id).then(renderRelatedVideos); }
            } catch (err) { if (!append) { searchResults = []; allSearchResults = []; renderResults(); } showToast(err.message); }
            finally { searchButton.disabled = false; isLoadingMore = false; updatePaginationUI(); }
        }

        function loadVideo(item, opts = {}) {
            if (!player?.loadVideoById) return showToast("Player belum siap.");
            selectedVideoId = item.id; isVideoTransitioning = true;
            const start = opts.startTime || 0;
            if (opts.autoplay !== false) player.loadVideoById({ videoId: item.id, startSeconds: start });
            else player.cueVideoById({ videoId: item.id, startSeconds: start });
            player.mute(); player.setVolume(0);
            playerWrap.classList.add("visible"); playerWrap.classList.toggle("minimized", !!opts.minimized);
            playerWrap.classList.remove("controls-hidden");
            videoInfo.classList.add("visible"); videoInfo.classList.toggle("minimized", !!opts.minimized);
            playerOverlay.classList.remove("hidden");
            currentTitle.textContent = item.title; currentMeta.textContent = `${item.channelTitle} - ${item.description}`;
            renderResults(); fetchRelatedVideos(item.id).then(renderRelatedVideos); schedulePlayerControlsHide(1600);
            if (!opts.silentSave) saveAppState();
        }

        function minimizePlayerForSearch() { if (!selectedVideoId || !playerWrap.classList.contains("visible")) return; if (isTheaterMode) toggleTheaterMode(); if (isFullscreen) toggleFullscreen(); playerWrap.classList.add("minimized"); videoInfo.classList.add("minimized"); setPlayerControlsVisible(true); requestAnimationFrame(() => resultsCard.scrollIntoView({ behavior: "smooth", block: "start" })); saveAppState(); }
        function toggleVideoPlayback() { if (!player || !selectedVideoId) return showToast("Pilih video dulu."); player.getPlayerState() === YT.PlayerState.PLAYING ? player.pauseVideo() : (player.playVideo(), player.mute(), player.setVolume(0)); setPlayerControlsVisible(true); schedulePlayerControlsHide(); }
        function toggleTheaterMode() { isTheaterMode = !isTheaterMode; updateTheaterModeUI(); saveAppState(); showToast(isTheaterMode ? "Theater mode aktif" : "Theater mode nonaktif"); }
        function updateTheaterModeUI() { mainPage.classList.toggle("theater-mode", isTheaterMode); playerWrap.classList.toggle("theater", isTheaterMode); theaterBtn.classList.toggle("active", isTheaterMode); theaterBtn.querySelector("i").className = isTheaterMode ? "fa-solid fa-compress" : "fa-solid fa-expand"; }
        function toggleFullscreen() { !document.fullscreenElement ? (playerWrap.requestFullscreen?.() || playerWrap.webkitRequestFullscreen?.()) : (document.exitFullscreen?.() || document.webkitExitFullscreen?.()); }
        function updateFullscreenButtonUI() { isFullscreen = !!document.fullscreenElement; fullscreenBtn.querySelector("i").className = isFullscreen ? "fa-solid fa-compress" : "fa-solid fa-up-right-and-down-left-from-center"; fullscreenBtn.classList.toggle("active", isFullscreen); document.documentElement.classList.toggle("fullscreen-active", isFullscreen); saveAppState(); }
        document.addEventListener("fullscreenchange", updateFullscreenButtonUI); document.addEventListener("webkitfullscreenchange", updateFullscreenButtonUI);

        // ✅ FIX SCROLL: Listen to window scroll + bounding check on resultsCard
        function handleScroll() {
            if (!hasMoreResults || isLoadingMore || searchResults.length >= MAX_INLINE_ITEMS) return;
            const rect = resultsCard.getBoundingClientRect();
            const cardBottom = rect.bottom;
            const viewportBottom = window.innerHeight;
            // Trigger jika bagian bawah resultsCard berada dalam threshold dari bawah viewport
            if (cardBottom > 0 && cardBottom < viewportBottom + SCROLL_THRESHOLD) {
                loadMoreResults();
            }
        }

        // Event Listeners
        toggleVideoButton.addEventListener("click", toggleVideoPlayback);
        playerShield.addEventListener("click", toggleVideoPlayback);
        syncAudioSideButton.addEventListener("click", syncSelectedAudio);
        document.getElementById("prev-track").addEventListener("click", () => selectTrack((selectedTrackIndex - 1 + audioTracks.length) % audioTracks.length, true));
        document.getElementById("next-track").addEventListener("click", () => selectTrack((selectedTrackIndex + 1) % audioTracks.length, true));
        shuffleTrackButton.addEventListener("click", playRandomTrack);
        repeatDecreaseBtn.addEventListener("click", () => setRepeatCount(maxRepeat - 1));
        repeatIncreaseBtn.addEventListener("click", () => setRepeatCount(maxRepeat + 1));
        quickChipButtons.forEach(b => b.addEventListener("click", () => { searchQueryInput.value = b.dataset.query; searchVideos(); }));
        toggleAudioButton.addEventListener("click", toggleAudioPlayback);
        searchButton.addEventListener("click", () => searchVideos());
        searchQueryInput.addEventListener("keydown", e => { if (e.key === "Enter") searchVideos(); });
        audioVolume.addEventListener("input", () => { audioElement.volume = audioVolume.value / 100; volumeValue.textContent = `${audioVolume.value}%`; saveAppState(); });
        murottalSearchInput.addEventListener("input", e => filterTracks(e.target.value));
        theaterBtn.addEventListener("click", toggleTheaterMode);
        fullscreenBtn.addEventListener("click", toggleFullscreen);
        document.addEventListener("keydown", e => {
            if (e.key.toLowerCase() === "f" && playerWrap.classList.contains("visible") && !document.activeElement.matches("input")) { e.preventDefault(); toggleFullscreen(); }
            if (e.key.toLowerCase() === "t" && playerWrap.classList.contains("visible") && !document.activeElement.matches("input")) { e.preventDefault(); toggleTheaterMode(); }
            if (e.key === "Escape") { if(isFullscreen) toggleFullscreen(); if(isTheaterMode) toggleTheaterMode(); }
        });
        progressBar.addEventListener("click", e => { if (!player?.getDuration) return; player.seekTo(player.getDuration() * ((e.clientX - progressBar.getBoundingClientRect().left) / progressBar.getBoundingClientRect().width), true); setPlayerControlsVisible(true); schedulePlayerControlsHide(); });
        
        playerExpandBtn.addEventListener("click", () => { playerWrap.classList.remove("minimized"); videoInfo.classList.remove("minimized"); saveAppState(); requestAnimationFrame(() => playerWrap.scrollIntoView({ behavior: 'smooth', block: 'start' })); });
        loadMoreBtn.addEventListener("click", () => { if (nextPageToken && !isLoadingMore) loadMoreResults(); });
        
        // ✅ FIX: Window scroll listener menggantikan resultsCard scroll
        window.addEventListener("scroll", handleScroll, { passive: true });
        window.addEventListener("resize", handleScroll, { passive: true });
        
        refreshRelatedBtn.addEventListener("click", () => { if (selectedVideoId) { showToast("Memuat rekomendasi..."); fetchRelatedVideos(selectedVideoId).then(renderRelatedVideos); } });
        audioElement.addEventListener("play", () => { audioMiniStatus.textContent = "Sedang diputar"; toggleAudioButton.innerHTML = '<i class="fa-solid fa-pause"></i>'; updateRepeatUI(); saveAppState(); });
        audioElement.addEventListener("pause", () => { audioMiniStatus.textContent = "Dijeda"; toggleAudioButton.innerHTML = '<i class="fa-solid fa-play"></i>'; saveAppState(); });
        audioElement.addEventListener("ended", () => { currentRepeat++; if (currentRepeat < maxRepeat) { audioElement.currentTime = 0; audioElement.play().catch(()=>{}); audioMiniStatus.textContent = "Mengulang"; updateRepeatUI(); saveAppState(); return; } audioMiniStatus.textContent = "Selesai"; toggleAudioButton.innerHTML = '<i class="fa-solid fa-play"></i>'; currentRepeat = 0; updateRepeatUI(); saveAppState(); });
        audioElement.addEventListener("error", () => { audioMiniStatus.textContent = "Error"; showToast("Periksa file murottal."); });

        restoreSavedState();
        if (!trackList.children.length) { renderTrackList(); selectTrack(selectedTrackIndex, false); audioElement.volume = audioVolume.value / 100; updateRepeatUI(); }
        window.addEventListener("beforeunload", saveAppState);
    </script>
</body>
</html>
