<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎬 Murottal Kids - Belajar Sambil Menonton</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <style>
        :root {
            --bg: #FFF8F0;
            --surface: #FFFFFF;
            --surface-alt: #FFF5E6;
            --line: #F0E0CC;
            --text: #3D2B1F;
            --text-light: #8B7355;
            --primary: #FF6B6B;
            --primary-dark: #E55555;
            --secondary: #4ECDC4;
            --secondary-dark: #3DB8B0;
            --accent: #FFE66D;
            --accent-dark: #FFD93D;
            --purple: #A78BFA;
            --purple-soft: #EDE9FE;
            --green: #10B981;
            --green-soft: #D1FAE5;
            --orange: #F59E0B;
            --orange-soft: #FEF3C7;
            --pink: #EC4899;
            --pink-soft: #FCE7F3;
            --blue: #3B82F6;
            --blue-soft: #DBEAFE;
            --radius-sm: 12px;
            --radius: 18px;
            --radius-lg: 24px;
            --radius-xl: 32px;
            --shadow-sm: 0 4px 12px rgba(61, 43, 31, 0.06);
            --shadow: 0 8px 24px rgba(61, 43, 31, 0.08);
            --shadow-lg: 0 16px 40px rgba(61, 43, 31, 0.12);
            --shadow-glow: 0 4px 20px rgba(255, 107, 107, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        html { scroll-behavior: smooth; }
        html.fullscreen-active body { overflow: hidden; }
        body { 
            font-family: "Nunito", sans-serif; 
            background: var(--bg); 
            color: var(--text);
            background-image: 
                radial-gradient(circle at 10% 20%, rgba(255, 107, 107, 0.08) 0%, transparent 20%),
                radial-gradient(circle at 90% 80%, rgba(78, 205, 196, 0.08) 0%, transparent 20%),
                radial-gradient(circle at 50% 50%, rgba(255, 230, 109, 0.05) 0%, transparent 30%);
            min-height: 100vh;
        }
        button, input { font: inherit; }

        /* Topbar */
        .topbar {
            position: sticky; top: 0; z-index: 100;
            background: rgba(255, 248, 240, 0.9); 
            backdrop-filter: blur(20px) saturate(180%);
            border-bottom: 2px solid var(--line);
            box-shadow: var(--shadow-sm);
        }
        html.fullscreen-active .topbar { display: none; }
        .topbar-inner { 
            max-width: 1400px; margin: 0 auto; padding: 12px 20px; 
            display: grid; grid-template-columns: auto 1fr; gap: 16px; align-items: center; 
        }
        .brand { 
            display: flex; align-items: center; gap: 10px; 
            font-weight: 900; font-size: 22px; color: var(--primary);
            text-shadow: 2px 2px 0px rgba(255, 107, 107, 0.2);
        }
        .brand-icon {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, var(--primary), var(--pink));
            border-radius: 50%;
            display: grid; place-items: center;
            color: white; font-size: 18px;
            box-shadow: var(--shadow-glow);
        }
        .searchbar { display: grid; grid-template-columns: 1fr 52px; gap: 10px; align-items: center; }
        .search-input { 
            width: 100%; border: 2px solid var(--line); background: var(--surface); 
            border-radius: 999px; padding: 12px 18px; color: var(--text); font-size: 15px;
            transition: all 0.2s;
        }
        .search-input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 4px rgba(255, 107, 107, 0.15); }
        .search-input::placeholder { color: var(--text-light); }
        .search-button { 
            border: none; background: linear-gradient(135deg, var(--primary), var(--primary-dark)); 
            border-radius: 999px; cursor: pointer; height: 48px; color: white;
            font-size: 16px; transition: all 0.2s; box-shadow: var(--shadow-glow);
        }
        .search-button:hover { transform: scale(1.05); box-shadow: 0 6px 24px rgba(255, 107, 107, 0.4); }
        .search-button:active { transform: scale(0.98); }
        .search-button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        /* Main Layout */
        .page { 
            max-width: 1400px; margin: 24px auto 40px; padding: 0 20px; 
            display: grid; grid-template-columns: minmax(0, 1fr) 380px; gap: 24px; align-items: start; 
        }
        .page.theater-mode { grid-template-columns: 1fr; max-width: 100%; padding: 0; }
        .page.theater-mode .watch-column { grid-template-columns: 1fr; padding: 0; }
        .page.theater-mode .sidebar { position: static; width: 100%; max-width: 800px; margin: 20px auto; padding: 0 20px; }
        .watch-column { min-width: 0; display: grid; gap: 20px; padding: 0 4px; }

        /* Quick Chips */
        .quick-chips { display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 12px; }
        .quick-chip { 
            border: 2px solid var(--line); background: var(--surface); color: var(--text); 
            border-radius: 999px; padding: 10px 18px; font-size: 14px; font-weight: 700; cursor: pointer;
            transition: all 0.2s; display: flex; align-items: center; gap: 6px;
        }
        .quick-chip:hover { 
            background: linear-gradient(135deg, var(--secondary), var(--secondary-dark)); 
            color: white; border-color: transparent; transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(78, 205, 196, 0.3);
        }
        .quick-chip:active { transform: translateY(0); }
        .quick-chip i { font-size: 14px; }

        /* Player */
        .player-wrap {
            background: linear-gradient(135deg, #1a1a2e, #16213e); 
            border-radius: var(--radius-lg); overflow: hidden; aspect-ratio: 16 / 9;
            display: none; box-shadow: var(--shadow-lg); position: relative;
            border: 3px solid rgba(255, 255, 255, 0.1);
            transition: border-radius 0.3s ease, box-shadow 0.3s ease, max-width 0.3s ease;
        }
        .player-wrap.visible { display: block; }
        .player-wrap.minimized {
            max-width: 320px; margin-left: auto; aspect-ratio: 16 / 9;
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.25);
            position: fixed; bottom: 24px; right: 24px; border-radius: var(--radius); z-index: 100;
            animation: popIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes popIn { from { transform: scale(0.8) translateY(20px); opacity: 0; } to { transform: scale(1) translateY(0); opacity: 1; } }
        .page.theater-mode .player-wrap.theater { border-radius: var(--radius-lg) var(--radius-lg) 0 0; box-shadow: none; border: none; width: 100%; max-width: 800px; margin: 0 auto; }
        .player-wrap.controls-hidden .player-overlay { opacity: 0; }

        #youtube-player { width: 100%; height: 100%; }
        .player-shield { position: absolute; inset: 0; z-index: 1; background: transparent; }

        .player-overlay {
            position: absolute; inset: 0; z-index: 2;
            display: flex; flex-direction: column; justify-content: space-between;
            background: linear-gradient(180deg, rgba(0, 0, 0, 0.3), transparent 25%, transparent 65%, rgba(0, 0, 0, 0.7));
            pointer-events: none; transition: opacity 0.22s ease, visibility 0.22s ease;
        }
        .player-overlay.hidden { display: none; }
        .player-bottom { pointer-events: auto; padding: 14px 16px; display: flex; align-items: center; gap: 10px; position: absolute; bottom: 0; width: 100%; flex-wrap: wrap; }
        .player-wrap.controls-hidden .player-bottom { pointer-events: none; }

        .player-progress { display: grid; gap: 6px; width: 100%; max-width: calc(100% - 220px); }
        .player-controls { display: flex; flex-wrap: wrap; gap: 8px; flex-shrink: 0; }
        .player-control-button { 
            border: none; border-radius: 999px; padding: 10px 14px; 
            background: rgba(255, 255, 255, 0.15); color: #fff; cursor: pointer; 
            font-weight: 700; backdrop-filter: blur(10px); display: flex; align-items: center; gap: 6px; 
            font-size: 13px; transition: all 0.15s;
        }
        .player-control-button.primary { background: rgba(255, 107, 107, 0.8); }
        .player-control-button:hover { background: rgba(255, 255, 255, 0.25); transform: scale(1.05); }
        .player-control-button.primary:hover { background: var(--primary); }
        .player-control-button:active { transform: scale(0.95); }

        .progress-bar { height: 10px; border-radius: 999px; overflow: hidden; margin-bottom: 6px; cursor: pointer; position: relative; background: rgba(255,255,255,0.15); }
        .progress-value { height: 100%; width: 0%; background: linear-gradient(90deg, var(--primary), var(--pink)); border-radius: 999px; transition: width 0.1s linear; }
        .progress-text { color: #fff; font-size: 12px; font-weight: 700; text-align: center; min-width: 90px; }

        /* Video Info */
        .video-info { margin-top: 12px; display: none; gap: 10px; }
        .video-info.visible { display: grid; }
        .video-info.minimized { display: none; }
        .page.theater-mode .video-info.visible { max-width: 800px; margin: 16px auto 0; padding: 0 20px; }
        .video-title { font-size: clamp(18px, 2.2vw, 24px); line-height: 1.3; font-weight: 800; letter-spacing: -0.01em; color: var(--text); }
        .video-meta { display: flex; flex-wrap: wrap; gap: 8px; color: var(--text-light); font-size: 14px; font-weight: 600; }
        .meta-badge { display: inline-flex; align-items: center; gap: 6px; padding: 6px 14px; border-radius: 999px; background: var(--surface-alt); font-weight: 700; }

        /* Cards */
        .card { background: var(--surface); border: 2px solid var(--line); border-radius: var(--radius-lg); padding: 18px; box-shadow: var(--shadow); transition: box-shadow 0.2s; }
        .card:hover { box-shadow: var(--shadow-lg); }
        .card-head { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin-bottom: 14px; }
        .card-head h3 { font-size: 17px; font-weight: 800; display: flex; align-items: center; gap: 8px; }
        .card-head h3 .icon { 
            width: 32px; height: 32px; border-radius: 10px; 
            display: grid; place-items: center; font-size: 14px; color: white;
        }
        .card-head span { color: var(--text-light); font-size: 13px; font-weight: 600; }
        
        /* Results */
        .results { display: grid; gap: 12px; }
        .result-item { 
            display: grid; grid-template-columns: 160px minmax(0, 1fr); gap: 12px; 
            background: var(--surface); border-radius: var(--radius); cursor: pointer; padding: 10px; 
            border: 2px solid transparent; transition: all 0.2s;
        }
        .result-item:hover { border-color: var(--primary); transform: translateY(-2px); box-shadow: var(--shadow); }
        .result-item.active { border-color: var(--secondary); background: var(--green-soft); }
        .result-thumb { position: relative; aspect-ratio: 16 / 9; border-radius: var(--radius-sm); overflow: hidden; background: linear-gradient(135deg, #f0f0f0, #e0e0e0); }
        .result-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .result-thumb .duration { position: absolute; right: 6px; bottom: 6px; background: rgba(0,0,0,0.8); color: #fff; border-radius: 6px; padding: 2px 6px; font-size: 11px; font-weight: 700; }
        .result-body { min-width: 0; padding: 4px 0; }
        .result-body strong { display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2; overflow: hidden; font-size: 15px; line-height: 1.4; margin-bottom: 4px; font-weight: 700; }
        .result-body p { color: var(--text-light); font-size: 12px; line-height: 1.5; display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2; overflow: hidden; }
        .empty { padding: 30px; border-radius: var(--radius); background: var(--surface-alt); color: var(--text-light); font-size: 15px; text-align: center; font-weight: 600; }

        /* Loading & Pagination */
        .loading-more { text-align: center; padding: 16px; color: var(--text-light); display: none; font-weight: 600; }
        .loading-more.active { display: block; }
        .loading-more i { animation: spin 1s linear infinite; margin-right: 8px; }
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .load-more-btn { 
            width: 100%; padding: 14px; margin-top: 10px; border: 2px solid var(--line); 
            background: var(--surface); border-radius: var(--radius); color: var(--text); 
            font-weight: 700; cursor: pointer; transition: all 0.2s; font-size: 14px;
        }
        .load-more-btn:hover:not(:disabled) { background: var(--green-soft); border-color: var(--green); color: var(--green); }
        .load-more-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .pagination-info { text-align: center; color: var(--text-light); font-size: 13px; margin-top: 8px; font-weight: 600; min-height: 20px; }

        /* Related */
        .related-list { display: grid; gap: 10px; }
        .related-item { display: grid; grid-template-columns: 110px minmax(0, 1fr); gap: 10px; background: var(--surface); border-radius: var(--radius-sm); cursor: pointer; padding: 8px; border: 2px solid transparent; transition: all 0.2s; }
        .related-item:hover, .related-item.active { border-color: var(--purple); transform: translateX(3px); }
        .related-item.active { background: var(--purple-soft); }
        .related-thumb { position: relative; aspect-ratio: 16 / 9; border-radius: 10px; overflow: hidden; background: linear-gradient(135deg, #f0f0f0, #e0e0e0); }
        .related-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .related-thumb .related-duration { position: absolute; right: 5px; bottom: 5px; background: rgba(0,0,0,0.8); color: #fff; border-radius: 4px; padding: 2px 5px; font-size: 10px; font-weight: 700; }
        .related-body strong { display: -webkit-box; -webkit-box-orient: vertical; -webkit-line-clamp: 2; overflow: hidden; font-size: 13px; line-height: 1.3; margin-bottom: 3px; font-weight: 700; }
        .related-body p { color: var(--text-light); font-size: 11px; }

        /* Sidebar - Murottal Card */
        .sidebar { min-width: 0; display: grid; gap: 20px; position: sticky; top: 84px; align-self: start; }
        .murottal-card { 
            background: linear-gradient(135deg, var(--green-soft), #f0fdf4); 
            border: 2px solid rgba(16, 185, 129, 0.15); 
            border-radius: var(--radius-lg); padding: 20px; box-shadow: var(--shadow);
        }
        .murottal-card .card-head h3 { color: var(--green); }
        
        .murottal-player { display: grid; gap: 14px; }
        .murottal-top { display: grid; grid-template-columns: 56px minmax(0, 1fr); gap: 12px; align-items: center; }
        .murottal-cover { 
            width: 56px; height: 56px; border-radius: 50%; 
            background: linear-gradient(135deg, var(--green), var(--secondary)); 
            color: #fff; display: grid; place-items: center; font-size: 22px;
            box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);
        }
        .murottal-now { min-width: 0; }
        .murottal-now strong { display: block; font-size: 14px; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; font-weight: 800; color: var(--text); }
        .murottal-now span { color: var(--text-light); font-size: 12px; font-weight: 600; }
        
        .murottal-buttons { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; align-items: center; }
        .audio-btn { 
            width: 100%; height: 46px; border-radius: 14px; border: none; cursor: pointer; 
            color: var(--text); background: var(--surface); font-size: 16px;
            transition: all 0.2s; box-shadow: var(--shadow-sm);
        }
        .audio-btn:hover { transform: translateY(-2px); box-shadow: var(--shadow); }
        .audio-btn:active { transform: translateY(0); }
        .audio-btn.primary { 
            background: linear-gradient(135deg, var(--green), var(--secondary)); 
            color: white; width: 52px; height: 52px; border-radius: 50%; 
            display: grid; place-items: center; margin: 0 auto;
            box-shadow: 0 8px 24px rgba(16, 185, 129, 0.4);
        }
        .audio-btn.primary:hover { transform: scale(1.1); box-shadow: 0 10px 28px rgba(16, 185, 129, 0.5); }

        .murottal-search { margin: 16px 0; position: relative; }
        .murottal-search input { 
            width: 100%; border: 2px solid rgba(16, 185, 129, 0.15); background: var(--surface); 
            border-radius: 14px; padding: 12px 14px 12px 38px; color: var(--text); font-size: 14px; font-weight: 600;
            transition: all 0.2s;
        }
        .murottal-search input:focus { outline: none; border-color: var(--green); box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1); }
        .murottal-search input::placeholder { color: var(--text-light); }
        .murottal-search i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-light); font-size: 13px; pointer-events: none; }
        
        .track-list { display: grid; gap: 8px; margin-top: 12px; max-height: 320px; overflow-y: auto; padding-right: 4px; }
        .track-list::-webkit-scrollbar { width: 6px; }
        .track-list::-webkit-scrollbar-thumb { background: rgba(16, 185, 129, 0.3); border-radius: 3px; }
        .track-item { 
            width: 100%; text-align: left; border: 2px solid rgba(16, 185, 129, 0.1); background: var(--surface); 
            border-radius: 14px; padding: 10px 14px; cursor: pointer; transition: all 0.2s;
            display: flex; align-items: center; gap: 10px;
        }
        .track-item:hover { border-color: var(--green); background: white; transform: translateX(3px); }
        .track-item.active { border-color: var(--green); background: white; box-shadow: 0 6px 16px rgba(16, 185, 129, 0.15); }
        .track-item .num { 
            width: 28px; height: 28px; border-radius: 50%; background: var(--surface-alt); 
            display: grid; place-items: center; font-size: 12px; font-weight: 800; color: var(--text-light); flex-shrink: 0;
        }
        .track-item.active .num { background: var(--green); color: white; }
        .track-item .info { min-width: 0; }
        .track-item strong { display: block; font-size: 13px; margin-bottom: 1px; font-weight: 700; }
        .track-item span { font-size: 11px; color: var(--text-light); }
        .track-item.no-results { text-align: center; padding: 24px; color: var(--text-light); cursor: default; border: none; background: transparent; }
        .track-item.no-results:hover { transform: none; border-color: transparent; background: transparent; }

        /* Repeat Section */
        .repeat-section { margin-top: 18px; padding-top: 16px; border-top: 2px dashed rgba(16, 185, 129, 0.15); }
        .repeat-section > span { font-size: 13px; font-weight: 700; color: var(--green); display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
        .repeat-controls { display: flex; align-items: center; gap: 10px; background: var(--surface); border-radius: 14px; padding: 6px; border: 2px solid rgba(16, 185, 129, 0.15); }
        .repeat-btn { 
            width: 34px; height: 34px; border-radius: 10px; border: none; background: var(--surface-alt); 
            color: var(--text); cursor: pointer; display: grid; place-items: center; font-weight: 800; font-size: 16px;
            transition: all 0.15s;
        }
        .repeat-btn:hover { background: var(--green); color: white; }
        .repeat-btn:active { transform: scale(0.92); }
        .repeat-display { flex: 1; text-align: center; font-weight: 800; color: var(--green); font-size: 16px; }
        .repeat-status { color: var(--text-light); font-size: 12px; margin-top: 8px; font-weight: 600; display: flex; align-items: center; gap: 8px; }
        .repeat-progress { flex: 1; height: 6px; background: rgba(16, 185, 129, 0.1); border-radius: 3px; overflow: hidden; }
        .repeat-progress-bar { height: 100%; background: linear-gradient(90deg, var(--green), var(--secondary)); border-radius: 3px; transition: width 0.3s ease; }
        
        /* Volume */
        .volume-wrap { margin-top: 16px; }
        .volume-slider { display: flex; align-items: center; gap: 10px; font-weight: 600; }
        .volume-slider i { color: var(--green); font-size: 14px; }
        input[type="range"] { width: 100%; accent-color: var(--green); cursor: pointer; height: 6px; }

        /* Expand Button */
        .player-expand-btn {
            position: absolute; top: 0; left: 0; z-index: 6; width: 100%; height: 100%;
            border: none; background: transparent; color: #fff; cursor: pointer;
            display: none; align-items: center; justify-content: center; font-size: 28px;
            transition: background 0.2s, opacity 0.2s; opacity: 0;
        }
        .player-wrap.minimized .player-expand-btn { display: flex; }
        .player-expand-btn:hover { background: rgba(0,0,0,0.5); opacity: 1; }

        /* Minimized Overrides */
        .player-wrap.minimized .player-shield { pointer-events: auto !important; z-index: 3; }
        .player-wrap.minimized .player-overlay { opacity: 1 !important; visibility: visible !important; pointer-events: auto !important; }
        .player-wrap.minimized .player-overlay.hidden { display: flex !important; opacity: 1 !important; }
        .player-wrap.minimized .player-bottom { opacity: 0; pointer-events: none !important; }
        .player-wrap.minimized .player-shield { background: transparent; }

        /* Hover Controls */
        .player-wrap:hover .player-overlay { opacity: 1 !important; visibility: visible !important; }
        .player-wrap:hover .player-bottom { pointer-events: auto !important; }
        .player-wrap.controls-hidden .player-overlay { opacity: 0; visibility: hidden; }
        .player-wrap:hover.controls-hidden .player-overlay { opacity: 1 !important; visibility: visible !important; }

        /* Fullscreen */
        .player-wrap:fullscreen, .player-wrap:-webkit-full-screen, .player-wrap:-moz-full-screen {
            width: 100vw; height: 100vh; border-radius: 0; margin: 0; display: block !important; position: fixed; top: 0; left: 0; z-index: 1000; border: none;
        }

        /* Toast */
        .toast { 
            position: fixed; left: 50%; bottom: 24px; transform: translateX(-50%) translateY(10px); 
            background: var(--text); color: #fff; padding: 12px 20px; border-radius: 999px; 
            font-size: 14px; font-weight: 700; opacity: 0; pointer-events: none; 
            transition: opacity 0.2s ease, transform 0.2s ease; z-index: 200; 
            box-shadow: var(--shadow-lg);
        }
        .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

        /* Responsive */
        @media (max-width: 1100px) { .page { grid-template-columns: 1fr; } .sidebar { position: static; } }
        @media (max-width: 760px) {
            .topbar-inner { grid-template-columns: 1fr; gap: 10px; padding: 10px 14px; }
            .searchbar { grid-template-columns: 1fr; }
            .page { padding: 0 12px; margin-top: 16px; }
            .player-bottom { padding: 10px; gap: 6px; }
            .player-control-button { padding: 8px 10px; font-size: 12px; }
            .player-progress { max-width: calc(100% - 140px); }
            .murottal-buttons { grid-template-columns: repeat(5, 1fr); gap: 6px; }
            .audio-btn { height: 42px; }
            .audio-btn.primary { width: 48px; height: 48px; }
            .page.theater-mode .player-wrap.theater { max-width: 100%; margin: 0; }
            .page.theater-mode .video-info.visible, .page.theater-mode .sidebar { max-width: 100%; padding: 0 8px; }
            .related-item { grid-template-columns: 90px minmax(0, 1fr); }

            repeatCount: $("repeat-count-display"), repeatText: $("repeat-text"),
            repeatBar: $("repeat-progress-bar"),
            volume: $("audio-volume"), volVal: $("volume-value"),
            trackSearch: $("murottal-search"),
            theaterBtn: $("theater-btn"), fullscreenBtn: $("fullscreen-btn"),
            toast: $("toast"), chips: document.querySelectorAll(".quick-chip")
        };

        const escapeHtml = t => { const d = document.createElement("div"); d.textContent = t; return d.innerHTML; };
        const fmt = s => { const m = Math.floor(s / 60), sec = Math.floor(s % 60); return `${String(m).padStart(2, "0")}:${String(sec).padStart(2, "0")}`; };
        const isoToClock = d => {
            const m = d?.match(/PT(?:(\d+)H)?(?:(\d+)M)?(?:(\d+)S)?/);
            if (!m) return "--:--";
            const [h = "00", min = "00", sec = "00"] = [m[1] || "0", m[2] || "0", m[3] || "0"].map(v => String(v).padStart(2, "0"));
            return m[1] ? `${h}:${min}:${sec}` : `${min}:${sec}`;
        };
        let toastTimer;
        const showToast = msg => {
            dom.toast.textContent = msg; dom.toast.classList.add("show");
            clearTimeout(toastTimer); toastTimer = setTimeout(() => dom.toast.classList.remove("show"), CONFIG.TOAST_DURATION);
        };
        const saveState = () => {
            if (state.saveTimer) return;
            state.saveTimer = setTimeout(() => {
                try {
                    localStorage.setItem(CONFIG.STORAGE_KEY, JSON.stringify({
                        q: dom.searchInput.value.trim(), results: state.searchResults.slice(0, CONFIG.ITEMS_PER_PAGE),
                        vid: state.selectedVideoId, tid: state.trackIndex, maxR: state.maxRepeat, curR: state.currentRepeat,
                        vol: Number(dom.volume.value), visible: dom.playerWrap.classList.contains("visible"),
                        mini: dom.playerWrap.classList.contains("minimized"),
                        time: state.player?.getCurrentTime?.() || 0, playing: state.player?.getPlayerState?.() === YT.PlayerState.PLAYING,
                        theater: state.isTheater, fs: state.isFullscreen,
                        npt: state.nextPageToken, query: state.query
                    }));
                } catch (e) { console.warn(e); }
                state.saveTimer = null;
            }, CONFIG.SAVE_DELAY);
        };

        function onYouTubeIframeAPIReady() {
            state.player = new YT.Player("youtube-player", {
                host: "https://www.youtube-nocookie.com", videoId: "",
                playerVars: { autoplay: 0, controls: 0, fs: 0, disablekb: 1, iv_load_policy: 3, rel: 0, modestbranding: 1, playsinline: 1 },
                events: { onReady: onReady, onStateChange: onStateChange }
            });
        }
        function onReady() { state.player.mute(); state.player.setVolume(0); updateDisplay(); if (state.pendingRestore) { restoreVideoState(state.pendingRestore); state.pendingRestore = null; } }
        function onStateChange(e) {
            if (!state.player) return;
            state.player.mute(); state.player.setVolume(0);
            if (e.data === YT.PlayerState.PLAYING) {
                state.transitioning = false;
                if (!dom.audio.src) selectTrack(state.trackIndex, false);
                if (dom.audio.paused) dom.audio.play().catch(() => {});
                startProgressLoop(); scheduleHide(); updatePlayIcons(true);
            } else if (e.data === YT.PlayerState.PAUSED) {
                stopProgressLoop(); showOverlay();
                if (!state.transitioning && !dom.audio.paused) dom.audio.pause();
                updatePlayIcons(false);
            } else if (e.data === YT.PlayerState.ENDED) {
                stopProgressLoop(); showOverlay(); updatePlayIcons(false);
                const idx = state.searchResults.findIndex(v => v.id === state.selectedVideoId);
                if (idx >= 0 && idx < state.searchResults.length - 1) {
                    loadVideo(state.searchResults[idx + 1], { auto: true, keep: true });
                    showToast("Berikutnya: " + state.searchResults[idx + 1].title);
                } else { if (!dom.audio.paused) dom.audio.pause(); }
            }
            saveState();
        }

        function startProgressLoop() {
            stopProgressLoop();
            let last = -1;
            const tick = () => {
                if (!state.player?.getCurrentTime) return;
                const cur = state.player.getCurrentTime(), dur = state.player.getDuration();
                if (cur !== last || !state.progressFrame) { last = cur; updateDisplay(cur, dur); }
                state.progressFrame = requestAnimationFrame(tick);
            };
            state.progressFrame = requestAnimationFrame(tick);
        }
        function stopProgressLoop() { if (state.progressFrame) { cancelAnimationFrame(state.progressFrame); state.progressFrame = null; } }
        function updateDisplay(c = 0, d = 0) {
            if (!state.player?.getCurrentTime) { dom.timeDisplay.textContent = "00:00 / 00:00"; dom.progressValue.style.width = "0%"; return; }
            c = state.player.getCurrentTime() || c; d = state.player.getDuration() || d;
            dom.timeDisplay.textContent = `${fmt(c)} / ${fmt(d)}`;
            dom.progressValue.style.width = d ? `${(c / d) * 100}%` : "0%";
        }
        function updatePlayIcons(playing) {
            dom.toggleVideo.querySelector("i").className = `fa-solid ${playing ? "fa-pause" : "fa-play"}`;
            dom.toggleAudio.querySelector("i").className = `fa-solid ${dom.audio.paused ? "fa-play" : "fa-pause"}`;
        }

        function showOverlay() { dom.overlay.classList.remove("hidden"); dom.overlay.style.opacity = "1"; }
        function scheduleHide(delay = 1500) {
            clearTimeout(state.overlayTimer);
            state.overlayTimer = setTimeout(() => {
                if (dom.playerWrap.classList.contains("visible") && state.player?.getPlayerState?.() === YT.PlayerState.PLAYING) hideOverlay();
            }, delay);
        }

        async function fetchWithDurations(params) {
            const url = new URL("https://www.googleapis.com/youtube/v3/search");
            Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
            const res = await fetch(url), data = await res.json();
            if (!res.ok) throw new Error(data.error?.message || "Gagal memuat");
            const ids = (data.items || []).map(i => i.id?.videoId).filter(Boolean);
            if (!ids.length) return { items: [], npt: null };
            const cached = [], uncached = [];
            ids.forEach(id => state.durationCache.has(id) ? cached.push({ id, dur: state.durationCache.get(id) }) : uncached.push(id));
            const map = new Map(cached.map(c => [c.id, c.dur]));
            if (uncached.length) {
                const u2 = new URL("https://www.googleapis.com/youtube/v3/videos");
                u2.searchParams.set("part", "contentDetails"); u2.searchParams.set("id", uncached.join(",")); u2.searchParams.set("key", CONFIG.API_KEY);
                const r2 = await fetch(u2), d2 = await r2.json();
                (d2.items || []).forEach(i => { const dur = i.contentDetails?.duration || ""; state.durationCache.set(i.id, dur); map.set(i.id, dur); });
            }
            return { items: (data.items || []).map(i => ({ id: i.id.videoId, title: i.snippet.title, channelTitle: i.snippet.channelTitle, description: (i.snippet.description || "").slice(0, 120), thumbnail: i.snippet.thumbnails.medium?.url || "", durationLabel: isoToClock(map.get(i.id.videoId) || "") })), npt: data.nextPageToken || null };
        }

        async function searchVideos(append = false) {
            const q = dom.searchInput.value.trim();
            if (!q) { showToast("Masukkan kata kunci pencarian."); dom.searchInput.focus(); return; }
            if (!append) {
                minimizeForSearch(); dom.searchBtn.disabled = true;
                dom.results.innerHTML = '<div class="empty">⏳ Sedang mencari video...</div>';
                dom.loading.classList.remove("active");
                state.allResults = []; state.searchResults = []; state.nextPageToken = null; state.query = q; state.hasMore = true; state.isLoading = false;
            }
            state.isLoading = append; updatePagination();
            try {
                const r = await fetchWithDurations({ part: "snippet", type: "video", maxResults: String(append ? CONFIG.ITEMS_PER_SCROLL : CONFIG.ITEMS_PER_PAGE), q: state.query, key: CONFIG.API_KEY, ...(state.nextPageToken && append ? { pageToken: state.nextPageToken } : {}) });
                if (append) { state.allResults.push(...r.items); state.searchResults.push(...r.items); } else { state.allResults = [...r.items]; state.searchResults = [...r.items]; }
                state.nextPageToken = r.npt; state.hasMore = !!r.npt;
                renderResults(append);
                if (!append && state.searchResults.length) {
                    const t = state.selectedVideoId ? state.searchResults.find(v => v.id === state.selectedVideoId) : state.searchResults[0];
                    if (t) fetchRelated(t.id).then(renderRelated);
                }
            } catch (e) { if (!append) { state.searchResults = []; state.allResults = []; renderResults(); } showToast(e.message); }
            finally { dom.searchBtn.disabled = false; state.isLoading = false; updatePagination(); }
        }

        async function loadMore() { if (state.isLoading || !state.hasMore || !state.nextPageToken) return; await searchVideos(true); }
        async function fetchRelated(vid) {
            if (!vid) return [];
            try { const r = await fetchWithDurations({ part: "snippet", type: "video", maxResults: "8", relatedToVideoId: vid, key: CONFIG.API_KEY, relevanceLanguage: "id" }); return r.items; }
            catch (e) { console.error(e); return []; }
        }

        function createItem(item, type = "result") {
            const active = item.id === state.selectedVideoId;
            const el = document.createElement("div");
            el.className = `${type}-item${active ? " active" : ""}`;
            el.innerHTML = `<div class="${type}-thumb"><img src="${escapeHtml(item.thumbnail)}" alt="" loading="lazy" decoding="async"><span class="${type === "result" ? "duration" : "related-duration"}">${escapeHtml(item.durationLabel)}</span></div><div class="${type}-body"><strong>${escapeHtml(item.title)}</strong><p>${escapeHtml(item.channelTitle)}</p>${type === "result" ? `<p>${escapeHtml(item.description)}</p>` : ""}</div>`;
            return el;
        }

        function renderResults(append = false) {
            const frag = document.createDocumentFragment();
            const slice = append ? state.searchResults.slice(dom.results.children.length) : state.searchResults;
            if (!append) dom.results.innerHTML = "";
            if (!slice.length && !append) { dom.results.innerHTML = '<div class="empty">😔 Tidak ada hasil ditemukan</div>'; dom.resultsCount.textContent = "0 hasil"; updatePagination(); saveState(); return; }
            slice.forEach(item => {
                const card = createItem(item);
                card.addEventListener("click", () => { loadVideo(item); setTimeout(() => dom.playerWrap.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50); });
                frag.appendChild(card);
            });
            dom.results.appendChild(frag); dom.resultsCount.textContent = `${state.allResults.length} hasil`; updatePagination(); saveState();
        }

        function renderRelated(videos) {
            if (!videos?.length) { dom.relatedSection.style.display = "none"; return; }
            dom.relatedSection.style.display = "block"; dom.relatedList.innerHTML = "";
            const frag = document.createDocumentFragment();
            videos.forEach(v => {
                const el = createItem(v, "related");
                el.addEventListener("click", () => { loadVideo(v, { keep: true }); fetchRelated(v.id).then(renderRelated); setTimeout(() => dom.playerWrap.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50); });
                frag.appendChild(el);
            });
            dom.relatedList.appendChild(frag);
        }

        function updatePagination() {
            const shown = Math.min(state.searchResults.length, state.allResults.length), total = state.allResults.length;
            if (total <= CONFIG.ITEMS_PER_PAGE) { dom.loadMoreBtn.style.display = "none"; dom.pageInfo.textContent = total ? `Menampilkan ${total} video` : ""; return; }
            dom.pageInfo.textContent = `Menampilkan ${shown} dari ${total} video`;
            const canLoad = state.searchResults.length >= CONFIG.MAX_INLINE_ITEMS && state.hasMore && !state.isLoading;
            dom.loadMoreBtn.style.display = canLoad ? "block" : "none"; dom.loadMoreBtn.disabled = false;
            if (!canLoad && state.searchResults.length < CONFIG.MAX_INLINE_ITEMS && state.hasMore) dom.pageInfo.textContent += " • Scroll untuk muat lebih";
            else if (!state.hasMore) dom.pageInfo.textContent = `Semua ${total} video telah dimuat`;
        }

        function loadVideo(item, opts = {}) {
            if (!state.player?.loadVideoById) { showToast("Player belum siap."); return; }
            state.selectedVideoId = item.id; state.transitioning = true;
            const start = opts.start || 0;
            if (opts.auto !== false) state.player.loadVideoById({ videoId: item.id, startSeconds: start });
            else state.player.cueVideoById({ videoId: item.id, startSeconds: start });
            state.player.mute(); state.player.setVolume(0);
            dom.playerWrap.classList.add("visible"); dom.playerWrap.classList.toggle("minimized", !!opts.mini);
            dom.videoInfo.classList.add("visible"); dom.videoInfo.classList.toggle("minimized", !!opts.mini);
            showOverlay(); dom.playerWrap.classList.remove("controls-hidden");
            dom.title.textContent = item.title; dom.meta.textContent = `${item.channelTitle} • ${item.description}`;
            renderResults(); fetchRelated(item.id).then(renderRelated); scheduleHide(2000);
            if (!opts.silent) saveState();
        }

        function minimizeForSearch() {
            if (!state.selectedVideoId || !dom.playerWrap.classList.contains("visible")) return;
            if (state.isTheater) toggleTheater(); if (state.isFullscreen) toggleFullscreen();
            dom.playerWrap.classList.add("minimized"); dom.videoInfo.classList.add("minimized");
            showOverlay(); setTimeout(() => dom.resultsCard.scrollIntoView({ behavior: "smooth", block: "start" }), 50); saveState();
        }

        function togglePlayback() {
            if (!state.player || !state.selectedVideoId) { showToast("Pilih video dulu."); return; }
            state.player.getPlayerState() === YT.PlayerState.PLAYING ? state.player.pauseVideo() : (state.player.playVideo(), state.player.mute(), state.player.setVolume(0));
            showOverlay(); scheduleHide();
        }

        function toggleTheater() {
            state.isTheater = !state.isTheater;
            dom.mainPage.classList.toggle("theater-mode", state.isTheater);
            dom.playerWrap.classList.toggle("theater", state.isTheater);
            dom.theaterBtn.classList.toggle("active", state.isTheater);
            dom.theaterBtn.querySelector("i").className = state.isTheater ? "fa-solid fa-compress" : "fa-solid fa-expand";
            saveState(); showToast(state.isTheater ? "Theater mode aktif" : "Theater mode nonaktif");
        }

        function toggleFullscreen() {
            if (!document.fullscreenElement) dom.playerWrap.requestFullscreen?.() || dom.playerWrap.webkitRequestFullscreen?.();
            else document.exitFullscreen?.() || document.webkitExitFullscreen?.();
        }

        function updateFullscreenUI() {
            state.isFullscreen = !!document.fullscreenElement;
            dom.fullscreenBtn.querySelector("i").className = state.isFullscreen ? "fa-solid fa-compress" : "fa-solid fa-up-right-and-down-left-from-center";
            dom.fullscreenBtn.classList.toggle("active", state.isFullscreen);
            document.documentElement.classList.toggle("fullscreen-active", state.isFullscreen); saveState();
        }

        function filterTracks(q) {
            const l = q.toLowerCase().trim();
            state.filteredTracks = l ? audioTracks.filter(t => t.title.toLowerCase().includes(l) || t.reciter.toLowerCase().includes(l)) : [...audioTracks];
            renderTracks();
        }

        function renderTracks() {
            const frag = document.createDocumentFragment();
            dom.trackList.innerHTML = "";
            if (!state.filteredTracks.length) { dom.trackList.innerHTML = '<div class="track-item no-results">😔 Tidak ada hasil</div>'; return; }
            state.filteredTracks.forEach(t => {
                const idx = audioTracks.findIndex(a => a.id === t.id);
                const btn = document.createElement("button");
                btn.type = "button"; btn.className = `track-item${idx === state.trackIndex ? " active" : ""}`;
                btn.innerHTML = `<div class="num">${t.id}</div><div class="info"><strong>${escapeHtml(t.title)}</strong><span>${escapeHtml(t.reciter)}</span></div>`;
                btn.addEventListener("click", () => selectTrack(idx, true));
                frag.appendChild(btn);
            });
            dom.trackList.appendChild(frag);
        }

        function selectTrack(idx, auto = true) {
            state.trackIndex = idx; state.currentRepeat = 0;
            dom.audio.src = audioTracks[idx].file; dom.audio.load();
            dom.trackInfo.textContent = audioTracks[idx].title;
            dom.status.textContent = audioTracks[idx].reciter;
            dom.toggleAudio.querySelector("i").className = "fa-solid fa-play";
            updateRepeatUI(); renderTracks(); saveState();
            if (auto) dom.audio.play().catch(() => {});
        }

        function updateRepeatUI() {
            dom.repeatCount.textContent = state.maxRepeat;
            const p = Math.min(state.currentRepeat + 1, state.maxRepeat);
            dom.repeatText.textContent = `Putaran ${p}/${state.maxRepeat}`;
            dom.repeatBar.style.width = `${(p / state.maxRepeat) * 100}%`;
        }

        function setRepeat(c) { state.maxRepeat = Math.max(1, Math.min(20, c)); state.currentRepeat = 0; updateRepeatUI(); saveState(); showToast(`Pengulangan diatur ${state.maxRepeat} kali`); }
        function playRandom() {
            if (audioTracks.length < 2) return selectTrack(state.trackIndex, true);
            let n = state.trackIndex; while (n === state.trackIndex) n = Math.floor(Math.random() * audioTracks.length);
            selectTrack(n, true); showToast(`Surat diacak ke ${audioTracks[n].title}`);
        }
        function toggleAudio() { if (!dom.audio.src) selectTrack(state.trackIndex, false); dom.audio.paused ? dom.audio.play().catch(() => {}) : dom.audio.pause(); }

        function restoreState() {
            try {
                const raw = localStorage.getItem(CONFIG.STORAGE_KEY);
                if (!raw) { state.searchResults = defaultSuggestions; state.allResults = [...defaultSuggestions]; renderResults(); return; }
                const s = JSON.parse(raw);
                dom.searchInput.value = s.q || "";
                state.searchResults = Array.isArray(s.results) && s.results.length ? s.results : defaultSuggestions;
                state.allResults = [...state.searchResults];
                state.trackIndex = Number.isInteger(s.tid) ? Math.min(Math.max(s.tid, 0), audioTracks.length - 1) : 0;
                state.maxRepeat = Math.max(1, Number(s.maxR) || 3); state.currentRepeat = Math.max(0, Number(s.curR) || 0);
                dom.volume.value = String(Math.max(0, Math.min(100, Number(s.vol) || 72)));
                dom.audio.volume = dom.volume.value / 100; dom.volVal.textContent = `${dom.volume.value}%`;
                state.nextPageToken = s.npt || null; state.query = s.query || "";
                state.isTheater = !!s.theater; state.isFullscreen = !!s.fs;
                dom.mainPage.classList.toggle("theater-mode", state.isTheater);
                dom.playerWrap.classList.toggle("theater", state.isTheater);
                dom.theaterBtn.classList.toggle("active", state.isTheater);
                dom.theaterBtn.querySelector("i").className = state.isTheater ? "fa-solid fa-compress" : "fa-solid fa-expand";
                updateFullscreenUI(); renderResults(); updatePagination();
                selectTrack(state.trackIndex, false); updateRepeatUI();
                if (s.vid) state.pendingRestore = s;
            } catch (e) { console.error(e); state.searchResults = defaultSuggestions; state.allResults = [...defaultSuggestions]; renderResults(); selectTrack(state.trackIndex, false); }
        }

        function restoreVideoState(s) {
            if (!state.player || !s?.vid) return;
            const item = state.searchResults.find(i => i.id === s.vid);
            if (!item) return;
            loadVideo(item, { start: s.time || 0, auto: !!s.playing, mini: !!s.mini, silent: true, keep: true });
        }

        function setupObserver() {
            const sentinel = document.createElement("div"); sentinel.style.height = "1px"; sentinel.style.visibility = "hidden";
            dom.resultsCard.appendChild(sentinel);
            state.observer = new IntersectionObserver(([entry]) => {
                if (entry.isIntersecting && !state.isLoading && state.hasMore && state.searchResults.length < CONFIG.MAX_INLINE_ITEMS) loadMore();
            }, { rootMargin: `${CONFIG.SCROLL_THRESHOLD}px` });
            state.observer.observe(sentinel);
        }

        function setupEvents() {
            dom.toggleVideo.addEventListener("click", togglePlayback);
            dom.shield.addEventListener("click", togglePlayback);
            dom.expandBtn.addEventListener("click", () => { dom.playerWrap.classList.remove("minimized"); dom.videoInfo.classList.remove("minimized"); saveState(); setTimeout(() => dom.playerWrap.scrollIntoView({ behavior: 'smooth', block: 'start' }), 50); });
            dom.progressBar.addEventListener("click", e => {
                if (!state.player?.getDuration) return;
                const r = dom.progressBar.getBoundingClientRect();
                state.player.seekTo(state.player.getDuration() * Math.max(0, Math.min(1, (e.clientX - r.left) / r.width)), true);
                showOverlay(); scheduleHide();
            });
            dom.toggleAudio.addEventListener("click", toggleAudio);
            dom.prev.addEventListener("click", () => selectTrack((state.trackIndex - 1 + audioTracks.length) % audioTracks.length, true));
            dom.next.addEventListener("click", () => selectTrack((state.trackIndex + 1) % audioTracks.length, true));
            dom.shuffle.addEventListener("click", playRandom);
            dom.syncBtn.addEventListener("click", () => { if (!state.selectedVideoId) return showToast("Pilih video dulu."); selectTrack(state.trackIndex, true); dom.audio.currentTime = 0; });
            dom.repeatDec.addEventListener("click", () => setRepeat(state.maxRepeat - 1));
            dom.repeatInc.addEventListener("click", () => setRepeat(state.maxRepeat + 1));
            dom.volume.addEventListener("input", () => { dom.audio.volume = dom.volume.value / 100; dom.volVal.textContent = `${dom.volume.value}%`; saveState(); });
            dom.audio.addEventListener("play", () => { dom.status.textContent = "Sedang diputar 🎵"; dom.toggleAudio.querySelector("i").className = "fa-solid fa-pause"; updateRepeatUI(); saveState(); });
            dom.audio.addEventListener("pause", () => { dom.status.textContent = "Dijeda ⏸️"; dom.toggleAudio.querySelector("i").className = "fa-solid fa-play"; saveState(); });
            dom.audio.addEventListener("ended", () => {
                state.currentRepeat++;
                if (state.currentRepeat < state.maxRepeat) { dom.audio.currentTime = 0; dom.audio.play().catch(() => {}); dom.status.textContent = "Mengulang 🔁"; updateRepeatUI(); saveState(); return; }
                dom.status.textContent = "Selesai ✅"; dom.toggleAudio.querySelector("i").className = "fa-solid fa-play";
                state.currentRepeat = 0; updateRepeatUI(); saveState();
            });
            dom.audio.addEventListener("error", () => { dom.status.textContent = "Error ❌"; showToast("Gagal memuat audio."); });
            dom.searchBtn.addEventListener("click", () => searchVideos());
            dom.searchInput.addEventListener("keydown", e => { if (e.key === "Enter") searchVideos(); });
            dom.chips.forEach(b => b.addEventListener("click", () => { dom.searchInput.value = b.dataset.query; searchVideos(); }));
            let searchTimer;
            dom.trackSearch.addEventListener("input", e => { clearTimeout(searchTimer); searchTimer = setTimeout(() => filterTracks(e.target.value), 200); });
            dom.theaterBtn.addEventListener("click", toggleTheater);
            dom.fullscreenBtn.addEventListener("click", toggleFullscreen);
            document.addEventListener("fullscreenchange", updateFullscreenUI);
            document.addEventListener("webkitfullscreenchange", updateFullscreenUI);
            document.addEventListener("keydown", e => {
                if (document.activeElement.matches("input, textarea")) return;
                const k = e.key.toLowerCase();
                if (k === "f" && dom.playerWrap.classList.contains("visible")) { e.preventDefault(); toggleFullscreen(); }
                if (k === "t" && dom.playerWrap.classList.contains("visible")) { e.preventDefault(); toggleTheater(); }
                if (k === " ") { e.preventDefault(); togglePlayback(); }
                if (k === "escape" && (state.isFullscreen || state.isTheater)) { if (state.isFullscreen) toggleFullscreen(); if (state.isTheater) toggleTheater(); }
            });
            dom.loadMoreBtn.addEventListener("click", () => { if (state.nextPageToken && !state.isLoading) loadMore(); });
            dom.refreshRelated.addEventListener("click", () => { if (state.selectedVideoId) { showToast("Memuat..."); fetchRelated(state.selectedVideoId).then(renderRelated); } });
            window.addEventListener("beforeunload", saveState);
        }

        function init() {
            restoreState(); setupEvents(); setupObserver();
            if (!dom.trackList.children.length) { renderTracks(); selectTrack(state.trackIndex, false); dom.audio.volume = dom.volume.value / 100; updateRepeatUI(); }
        }
        document.readyState === "loading" ? document.addEventListener("DOMContentLoaded", init) : init();
    </script>
</body>
</html>
